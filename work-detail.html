<html lang="ko">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE 3 STUDIO | Case Study</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
:root {
    --primary: #0066ff;
    --bg: #000;
    --surface: #0a0a0a;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard', sans-serif;overflow-x:hidden;word-break:keep-all;}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;z-index:1000;transition:.3s;}
nav.scrolled{background:rgba(5,5,5,.9);backdrop-filter:blur(12px);padding:1rem 3rem;box-shadow:0 4px 20px rgba(0,0,0,.3);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--primary);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links li a{color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;text-decoration:none;transition:.2s;}
.nav-links li a:hover, .nav-links li a.active{color:var(--primary);}

/* HERO */
.case-hero {
    min-height: 70vh;
    display: flex;
    align-items: flex-end;
    padding: 12rem 3rem 5rem;
    position: relative;
    overflow: hidden;
    background: #050505;
}
.hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.6;
    filter: blur(15px);
    transform: scale(1.05);
}
.hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, #000 0%, transparent 100%);
    z-index: 1;
}
.hero-container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.hero-slider-wrap { width: 100%; aspect-ratio: 16/10; background: rgba(255,255,255,0.05); border-radius: 2rem; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.5); position: relative; }
.swiper { width: 100%; height: 100%; }
.swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
.swiper-slide img, .swiper-slide video { width: 100%; height: 100%; object-fit: contain; }
.hero-cat { color: var(--primary); font-size: 0.8rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.5rem; }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; line-height: 1.05; margin-bottom: 2rem; letter-spacing: -0.04em; }
.hero-meta { display: flex; gap: 2rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; }
.hero-meta span i { color: var(--primary); margin-right: 0.6rem; }

/* LIGHT MODE OVERRIDES - HERO SLIDER */
body.light-mode .hero-slider-wrap { background: #fff; box-shadow: 0 40px 100px rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.05); }
body.light-mode .swiper-slide { background: #f0f3f8; }

/* YouTube iframe slide */
.swiper-slide .yt-frame { width: 100%; height: 100%; border: none; display: block; }

/* CONTENT */
.case-body { padding: 6rem 3rem 10rem; }
.case-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 6rem; align-items: start; }

.section-h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; letter-spacing: -0.02em; }
.section-p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.9; margin-bottom: 4rem; }

.case-sidebar { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 2rem; padding: 2.5rem; position: sticky; top: 120px; }
.side-item { margin-bottom: 2rem; }
.side-label { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.side-val { font-size: 1rem; font-weight: 700; color: #fff; }

.img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 4rem; }
.img-grid img { width: 100%; border-radius: 1.5rem; border: 1px solid var(--border); transition: 0.3s; }
.img-grid img:hover { border-color: var(--primary); }

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.8rem;
    color: #fff;
    text-decoration: none;
    font-weight: 800;
    font-size: 0.9rem;
    transition: 0.3s;
    margin-bottom: 2rem;
    padding: 0.8rem 1.5rem;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
}

.back-btn:hover {
    background: skyblue;
    color: #111;
    transform: translateX(-5px);
}

/* FOOTER */
footer { padding: 6rem 3rem; border-top: 1px solid var(--border); text-align: center; }
.footer-logo { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; text-decoration: none; display: inline-block; }
.footer-logo span { color: var(--primary); }
.footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase; }

/* MOBILE MENU & NAV TOGGLE */
.nav-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; z-index: 1001; }
.mobile-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(-100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; visibility: hidden; }
.mobile-menu.on { transform: translateY(0); opacity: 1; visibility: visible; }
.mobile-links { list-style: none; padding: 0; text-align: center; }
.mobile-links li { margin: 2rem 0; }
.mobile-links li a { color: #fff; font-size: 1.8rem; font-weight: 800; text-decoration: none; transition: 0.3s; }
.close-mobile { position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }

@media(max-width: 992px) {
    .hero-container { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
    .hero-meta { justify-content: center; gap: 1.5rem; }
    .hero-slider-wrap { max-width: 600px; margin: 0 auto; }
    .case-container { grid-template-columns: 1fr; gap: 4rem; }
    .case-sidebar { position: static; }
    .img-grid { grid-template-columns: 1fr; }
}

@media(max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .nav-toggle { display: block; }
    .case-hero { padding: 8rem 1.5rem 4rem; min-height: auto; }
    .hero-title { font-size: clamp(2rem, 8vw, 3rem); line-height: 1.2; }
    .hero-slider-wrap { border-radius: 1.2rem; }
    .case-body { padding: 4rem 1.5rem 8rem; }
}

body.light-mode .nav-toggle { color: #111; }
body.light-mode .mobile-menu { background: rgba(255,255,255,0.98); }
body.light-mode .mobile-links li a, body.light-mode .close-mobile { color: #111; }

/* LIGHT MODE SUPPORT - PREMIUM WHITE THEME */
body.light-mode { background: #fff; color: #111; }
body.light-mode nav { background: transparent; }
body.light-mode nav.scrolled { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom-color: rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
body.light-mode .nav-logo, body.light-mode .nav-links li a { color: #111; }
body.light-mode .case-hero { background: #fff; }
body.light-mode .hero-overlay { background: linear-gradient(to top, #fff 0%, transparent 100%); }
body.light-mode .hero-title { color: #000; }
body.light-mode .hero-bg { opacity: 0.1; filter: blur(30px); }
body.light-mode .case-sidebar { background: #fff; border-color: rgba(0,0,0,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.05); }
body.light-mode .side-val, body.light-mode .section-h2 { color: #111; }
body.light-mode .side-label { color: #0066ff; }
body.light-mode .section-p { color: #555; }
body.light-mode .back-btn { background: #0066ff; color: #fff; padding: 0.8rem 1.8rem; box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2); border-radius: 999px; }
body.light-mode .back-btn:hover { background: #0055dd; color: #fff; }
body.light-mode footer { background: #fbfcfe; border-top-color: rgba(0,0,0,0.05); }
body.light-mode .footer-logo, body.light-mode .footer-copy { color: #111; }
body.light-mode .footer-copy { opacity: 0.5; }

/* LIGHT MODE SUPPORT - CSS VARS */
body.light-mode {
    --bg: #fff;
    --surface: #f8f9fa;
    --border: rgba(0,0,0,0.08);
    --text: #111;
    --text-dim: #555;
}


/* NAV LIGHT MODE OVERRIDES */
body.light-mode nav:not(.scrolled) .nav-logo { color: #111 !important; }
body.light-mode nav:not(.scrolled) .nav-links li a { color: rgba(0,0,0,0.6) !important; }
body.light-mode nav:not(.scrolled) .nav-links li a:hover, body.light-mode nav:not(.scrolled) .nav-links li a.active { color: #0066ff !important; }
body.light-mode nav.scrolled { background: rgba(255,255,255,0.95) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important; border-bottom-color: rgba(0,0,0,0.05) !important; }
body.light-mode nav.scrolled .nav-logo { color: #111 !important; }
body.light-mode nav.scrolled .nav-links li a { color: rgba(0,0,0,0.6) !important; }
</style>
<script type="module" src="js/theme.js"></script>

</head>

<script type="module">
    import { db, collection, getDocs, getDoc, query, where, doc } from './js/firebase-init.js';
    const categoryLabel = { branding: 'Branding Design', consulting: 'Business Consulting', video: 'Video Production', integrated: 'Integrated Solution' };

    // id= 또는 slug= 파라미터 모두 지원
    const params = new URLSearchParams(location.search);
    const docId = params.get('id');
    const slug = params.get('slug');

    async function loadCase() {
        if (!docId && !slug) { location.href = 'work.html'; return; }
        try {
            let item = null;

            if (docId) {
                const docSnap = await getDoc(doc(db, 'portfolio', docId));
                if (docSnap.exists()) {
                    item = { ...docSnap.data(), id: docSnap.id };
                }
            }

            if (!item && slug) {
                const q = query(collection(db, 'portfolio'), where('slug', '==', slug));
                const qSnap = await getDocs(q);
                if (!qSnap.empty) {
                    item = { ...qSnap.docs[0].data(), id: qSnap.docs[0].id };
                } else {
                    try {
                        const docSnap = await getDoc(doc(db, 'portfolio', slug));
                        if (docSnap.exists()) item = { ...docSnap.data(), id: docSnap.id };
                    } catch(e) { console.warn('slug→id 조회 실패', e); }
                }
            }

            if (!item) {
                document.querySelector('.case-body').innerHTML = `
                    <div style="padding:3rem; text-align:center; color:#fff;">
                        <p style="font-size:1.5rem; margin-bottom:2rem;">데이터를 찾을 수 없습니다.</p>
                        <a href="work.html" style="color:#0088ff; font-size:1rem;">← 포트폴리오 목록으로</a>
                    </div>`;
                return;
            }

            document.title = `THE 3 STUDIO | ${item.title}`;
            document.getElementById('case-category').textContent = categoryLabel[item.category] || item.category;
            document.getElementById('case-title').textContent = item.title;
            document.getElementById('case-client').textContent = item.client || '-';
            document.getElementById('case-year').textContent = item.year || '-';
            document.getElementById('s-category').textContent = categoryLabel[item.category] || item.category;
            document.getElementById('s-client').textContent = item.client || '-';
            document.getElementById('s-year').textContent = item.year || '-';

            const isVideo = (path) => {
                if(!path) return false;
                const clean = path.split('?')[0].split('#')[0];
                return /\.(mp4|webm|mov|avi)$/i.test(clean);
            };

            const isYouTube = (url) => {
                if(!url) return false;
                return /(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})/.test(url);
            };

            const getYouTubeId = (url) => {
                const m = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/|youtube\.com\/live\/)?([\w-]{11})/);
                return m ? m[1] : null;
            };

            const cleanPath = (p) => {
                if(!p) return '';
                return (!p.startsWith('http') && !p.startsWith('/')) ? '/' + p : p;
            };

            // Hero Background
            const heroImg = item.hero_image || item.thumbnail;
            if (heroImg) {
                const hUri = cleanPath(heroImg);
                if(isVideo(hUri)) {
                    document.getElementById('hero-bg').innerHTML = `<video src="${hUri}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;opacity:0.8;"></video>`;
                    document.getElementById('hero-bg').style.backgroundImage = 'none';
                } else {
                    document.getElementById('hero-bg').style.backgroundImage = `url('${hUri}')`;
                }
            }

            // Slider Construction
            const swiperWrapper = document.getElementById('hero-swiper-wrapper');
            let slideUrls = [];
            if(item.thumbnail) slideUrls.push(item.thumbnail);
            if(item.images && item.images.length) {
                item.images.forEach(img => {
                    const u = (typeof img === 'string') ? img : (img.image_path || img.url);
                    if(u && !slideUrls.includes(u)) slideUrls.push(u);
                });
            }

            if(slideUrls.length > 0) {
                swiperWrapper.innerHTML = slideUrls.map(src => {
                    const uri = cleanPath(src);
                    const isYT = isYouTube(uri);
                    const ytId = isYT ? getYouTubeId(uri) : null;
                    return `
                        <div class="swiper-slide">
                            ${ isYT
                                ? `<iframe class="yt-frame" src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
                                : isVideo(uri)
                                    ? `<video src="${uri}" muted loop autoplay playsinline controls></video>`
                                    : `<img src="${uri}" alt="${item.title}">`
                            }
                        </div>
                    `;
                }).join('');

                new Swiper(".mainSwiper", {
                    pagination: { el: ".swiper-pagination", clickable: true },
                    navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                    loop: slideUrls.length > 1,
                    autoplay: slideUrls.length > 1 ? { delay: 5000 } : false,
                });
            }

            // Text Fields
            const setField = (id, wrapId, val) => {
                if(val) {
                    document.getElementById(id).textContent = val;
                    document.getElementById(wrapId).style.display = 'block';
                }
            };
            setField('text-challenge', 'section-challenge', item.challenge);
            setField('text-solution', 'section-solution', item.solution);
            setField('text-result', 'section-result', item.result);
            if(item.tags) document.getElementById('s-tags').textContent = item.tags;

            // Optional: Image Grid
            if (item.images && item.images.length) {
                const grid = document.getElementById('image-grid');
                grid.style.display = 'grid';
                grid.innerHTML = item.images.map(img => {
                    const iUri = cleanPath((typeof img === 'string') ? img : (img.image_path || img.url));
                    if (!iUri) return '';
                    if (isVideo(iUri)) {
                        return `<video src="${iUri}" muted loop autoplay playsinline style="width:100%;border-radius:1.5rem;border:1px solid var(--border);"></video>`;
                    } else {
                        return `<img src="${iUri}" alt="${item.title}" style="width:100%;border-radius:1.5rem;border:1px solid var(--border);">`;
                    }
                }).join('');
            }
        } catch (e) {
            console.error('Core Logic Error:', e);
        }
    }
    loadCase();

    window.addEventListener('scroll', () => {
        const navbar = document.getElementById('navbar');
        if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
    });

    // Mobile Menu Toggle Logic
    const toggleMobileMenu = () => {
        const menu = document.getElementById('mobile-menu');
        if (menu) {
            menu.classList.toggle('on');
            document.body.style.overflow = menu.classList.contains('on') ? 'hidden' : '';
        }
    };
    document.getElementById('nav-toggle')?.addEventListener('click', toggleMobileMenu);
    document.getElementById('close-mobile')?.addEventListener('click', toggleMobileMenu);
    document.querySelectorAll('.mobile-links a').forEach(link => {
        link.addEventListener('click', toggleMobileMenu);
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
