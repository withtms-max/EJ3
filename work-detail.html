<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE 3 STUDIO | Case Study</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<style>
:root {
    --primary: #C8102E;
    --transition: .3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* --------------------------------------------------------------------------
   [PART 1] DARK THEME ISLE
   -------------------------------------------------------------------------- */
body:not(.light-mode) {
    --bg-main: #0B1939;
    --bg-card: #12224A;
    --bg-darker: #050505;
    --text-main: #FFFFFF;
    --text-dim: rgba(255, 255, 255, 0.5);
    --border: rgba(255, 255, 255, 0.08);
    --input-bg: rgba(0,0,0,0.3);
}
body:not(.light-mode) .nav-logo { color: #fff; }
body:not(.light-mode) .back-btn { background: rgba(255, 255, 255, 0.1); color: #fff; }

/* --------------------------------------------------------------------------
   [PART 2] LIGHT THEME ISLE (High Contrast)
   -------------------------------------------------------------------------- */
body.light-mode {
    --bg-main: #F4F6F8;
    --bg-card: #FFFFFF;
    --bg-darker: #FFFFFF;
    --text-main: #111111;
    --text-dim: #6C757D;
    --border: rgba(0, 0, 0, 0.1);
    --input-bg: #FDFDFE;
}
body.light-mode h1, body.light-mode h2, body.light-mode .side-val, body.light-mode .section-h2 { color: #111 !important; }
body.light-mode .hero-overlay { background: linear-gradient(to top, #fff 0%, transparent 100%); }
body.light-mode .hero-bg { opacity: 0.1; }
body.light-mode .nav-logo { color: #111; }
body.light-mode .nav-links li a { color: #555 !important; }
body.light-mode .nav-links li a.active { color: var(--primary) !important; }
body.light-mode .nav.scrolled { background: rgba(255,255,255,0.95); }
body.light-mode .section-p { color: #444; }
body.light-mode .back-btn { background: var(--primary); color: #fff; box-shadow: 0 10px 20px rgba(0,102,255,0.2); }
body.light-mode .contact-integrated-card { background: #fff; box-shadow: 0 40px 100px rgba(0,0,0,0.05); }
body.light-mode .contact-item a, body.light-mode .contact-item .val { color: #111; }
body.light-mode .case-sidebar { background: #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.05); }
body.light-mode footer { background: #fff; }
body.light-mode .footer-logo, body.light-mode .footer-copy { color: #111; }

/* --------------------------------------------------------------------------
   [PART 0] COMMON SKELETON
   -------------------------------------------------------------------------- */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-main);color:var(--text-main);font-family:'Pretendard', sans-serif;overflow-x:hidden;word-break:keep-all; transition: background 0.5s ease;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background: var(--bg-main);}
::-webkit-scrollbar-thumb{background: #222; border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background: #000;}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;z-index:1000;transition:.3s;}
nav.scrolled{background:var(--bg-card);backdrop-filter:blur(12px);padding:1rem 3rem;box-shadow:0 4px 20px rgba(0,0,0,.3);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:inherit;text-decoration:none;}
.nav-logo span{color:var(--primary);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links li a{color:var(--text-dim);font-size:.85rem;font-weight:700;text-decoration:none;transition:.2s;}
.nav-links li a:hover, .nav-links li a.active{color:var(--primary);}

/* HERO */
.case-hero { min-height: 70vh; display: flex; align-items: flex-end; padding: 12rem 3rem 5rem; position: relative; overflow: hidden; background: var(--bg-darker); }
.hero-bg { 
    position: absolute; 
    inset: 0; 
    background-size: cover; 
    background-position: center; 
    opacity: 0; 
    filter: blur(20px) brightness(0.4); 
    transform: scale(1.1); 
    transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 0;
}
.hero-bg.active {
    opacity: 0.6;
    filter: blur(0px) brightness(0.5);
    transform: scale(1);
}
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-darker) 0%, transparent 100%); z-index: 1; }
.hero-container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.hero-slider-wrap { width: 100%; aspect-ratio: 16/10; background: rgba(255,255,255,0.05); border-radius: 2rem; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.5); position: relative; }
.swiper { width: 100%; height: 100%; }
.swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
.swiper-slide img, .swiper-slide video { width: 100%; height: 100%; object-fit: cover; }
.hero-cat { color: var(--primary); font-size: 0.8rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.5rem; }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; line-height: 1.05; margin-bottom: 2rem; letter-spacing: -0.04em; }
.hero-meta { display: flex; gap: 2rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; }
.hero-meta span i { color: var(--primary); margin-right: 0.6rem; }

/* CONTENT */
.case-body { padding: 6rem 3rem 10rem; }
.case-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 6rem; align-items: start; }
.section-h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 1.5rem; color: inherit; letter-spacing: -0.02em; }
.section-p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.9; margin-bottom: 4rem; }
.case-sidebar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 2rem; padding: 2.5rem; position: sticky; top: 120px; }
.side-item { margin-bottom: 2rem; }
.side-label { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.side-val { font-size: 1rem; font-weight: 700; color: inherit; }

.img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 4rem; }
.img-grid img { width: 100%; border-radius: 1.5rem; border: 1px solid var(--border); transition: 0.3s; }
.img-grid img:hover { border-color: var(--primary); }

.back-btn { display: inline-flex; align-items: center; gap: 0.8rem; color: inherit; text-decoration: none; font-weight: 800; font-size: 0.9rem; transition: 0.3s; margin-bottom: 2rem; padding: 0.8rem 1.5rem; border: 1px solid var(--border); border-radius: 999px; }
.back-btn:hover { background: var(--primary); color: #fff; transform: translateX(-5px); border-color: var(--primary); }

/* CONTACT SECTION IN DETAIL */
.contact-integrated-card { max-width: 1200px; margin: 6rem auto 4rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 3rem; display: grid; grid-template-columns: 1fr 1.5fr; overflow: hidden; }
.contact-left-col { padding: 4rem; border-right: 1px solid var(--border); }
.contact-right-col { padding: 4rem; background: rgba(255,255,255,0.01); }
.contact-item { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; text-align: left; }
.contact-icon { width: 55px; height: 55px; background: rgba(0, 102, 255, 0.15); border: 1px solid rgba(0, 102, 255, 0.25); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.4rem; }
.contact-item p { font-size: 0.8rem; color: var(--text-dim); margin: 0 0 0.2rem; }
.contact-item a, .contact-item .val { color: inherit; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
.form-group { margin-bottom: 1.8rem; text-align: left; }
.form-label { display: block; font-size: 0.85rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1.2rem; }
.c-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; color: inherit; outline: none; font-size: 1rem; transition: .2s; }
.c-input:focus { border-color: var(--primary); background: rgba(0, 102, 255, 0.05); }
.svc-chips { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 1rem; }
.svc-chip { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 0.6rem 1.4rem; border-radius: 999px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
.svc-chip:hover, .svc-chip.selected { border-color: var(--primary); color: #fff; background: var(--primary) !important; }
.btn-submit { width: 100%; background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); color: #000; border: none; padding: 1.4rem; border-radius: 999px; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 1rem; }

/* FOOTER */
footer { padding: 6rem 3rem; border-top: 1px solid var(--border); text-align: center; }
.footer-logo { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; color: inherit; text-decoration: none; display: inline-block; }
.footer-logo span { color: var(--primary); }
.footer-copy { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; }

/* MOBILE MENU & NAV TOGGLE */
.nav-toggle { display: none; background: none; border: none; color: inherit; font-size: 1.5rem; cursor: pointer; z-index: 1001; }
.mobile-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(-100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; visibility: hidden; }
.mobile-menu.on { transform: translateY(0); opacity: 1; visibility: visible; }
.mobile-links { list-style: none; padding: 0; text-align: center; }
.mobile-links li { margin: 2rem 0; }
.mobile-links li a { color: #fff; font-size: 1.8rem; font-weight: 800; text-decoration: none; transition: 0.3s; }
.close-mobile { position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }

  /* CARD NEWS STYLE REFINEMENT */
  .case-hero { min-height: 40vh; padding: 10rem 3rem 4rem; display: flex; align-items: center; justify-content: center; text-align: center; background: #000; }
  .hero-container { grid-template-columns: 1fr; gap: 0; max-width: 1000px; }
  .hero-title { font-size: clamp(2rem, 6vw, 4rem); margin-bottom: 1rem; }
  .hero-meta { justify-content: center; }

  .case-body { padding: 0; background: #000; }
  .case-container { grid-template-columns: 1fr; max-width: 100%; gap: 0; }
  
  /* Full Width Visual Media (Card News Style) */
  .visual-story-flow { width: 100%; display: flex; flex-direction: column; gap: 20px; background: #000; padding-bottom: 5rem; }
  .visual-story-flow img, 
  .visual-story-flow video, 
  .visual-story-flow iframe { 
    width: 100%; height: auto; display: block; 
    border-radius: 0; border: none; 
    max-height: 100vh; object-fit: cover; background: #050505;
  }
  
  .back-btn-wrap { padding: 2rem; position: fixed; top: 80px; left: 0; z-index: 100; pointer-events: none; }
  .back-btn { background: rgba(0,0,0,0.5) !important; backdrop-filter: blur(10px); pointer-events: auto; }
  
  .case-sidebar, #contact-section, #section-challenge, #section-solution, #section-result, .hero-slider-wrap { display: none !important; }

  footer { background: #000; border-top: 1px solid rgba(255,255,255,0.05); }

  @media (max-width: 768px) {
    .case-hero { padding: 8rem 1.5rem 3rem; }
    .hero-title { font-size: 1.8rem; }
  }
</style>
<script type="module" src="js/theme.js"></script>

</head>

  (function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
      document.documentElement.classList.add('light-mode');
    }
  })();

  <a href="index.html" class="nav-logo">THE <span>3</span> STUDIO</a>

<section class="case-hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-container">
        <div class="hero-text">
            <p class="hero-cat" id="case-category">Portfolio</p>
            <h1 class="hero-title" id="case-title">-</h1>
            <div class="hero-meta">
                <span><i class="fa fa-building"></i> <span id="case-client">-</span></span>
                <span><i class="fa fa-calendar-days"></i> <span id="case-year">-</span></span>
            </div>
        </div>

</section>

<div class="case-body">
    <div class="back-btn-wrap">
      <a href="work.html" class="back-btn"><i class="fa fa-arrow-left"></i> 목록으로</a>
    </div>
    
    <div class="case-container">
        <!-- Card News Visual Flow -->
        <div class="visual-story-flow" id="visual-flow">
            <!-- JS로 압도적인 크기의 이미지/영상이 채워짐 -->
        </div>

</div>

<footer>
    <a href="index.html" class="footer-logo">THE <span>3</span> STUDIO</a>
    <p class="footer-copy">© 2026 THE 3 STUDIO. ALL RIGHTS RESERVED.</p>
</footer>

<script type="module">
    import { db, collection, getDocs, getDoc, query, where, doc } from './js/firebase-init.js';
    const categoryLabel = { branding: 'Branding Design', consulting: 'Business Consulting', video: 'Video Production', integrated: 'Integrated Solution' };

    const params = new URLSearchParams(location.search);
    const docId = params.get('id');
    const slug = params.get('slug');

    async function loadCase() {
        if (!docId && !slug) return;
        try {
            let item = null;
            if (docId) {
                const docSnap = await getDoc(doc(db, 'portfolio', docId));
                if (docSnap.exists()) item = { ...docSnap.data(), id: docSnap.id };
            }
            if (!item && slug) {
                const qSnap = await getDocs(query(collection(db, 'portfolio'), where('slug', '==', slug)));
                if (!qSnap.empty) item = { ...qSnap.docs[0].data(), id: qSnap.docs[0].id };
            }

            if (!item) return;

            document.title = `THE 3 STUDIO | ${item.title}`;
            document.getElementById('case-category').textContent = categoryLabel[item.category] || item.category;
            document.getElementById('case-title').textContent = item.title;
            document.getElementById('case-client').textContent = item.client || '-';
            document.getElementById('case-year').textContent = item.year || '-';

            const cleanPath = (p) => (!p && p !== '') ? '' : ((!p.startsWith('http') && !p.startsWith('/')) ? '/' + p : p);
            const isVid = (p) => /\.(mp4|webm|mov|avi)$/i.test(p.split('?')[0].split('#')[0]);
            const getYTID = (url) => url.match(/(?:https?:)?\/\/(?:www\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/)?.[1];

            const flow = document.getElementById('visual-flow');
            let flowHTML = '';

            // 1. Thumbnail (Video or Image)
            if(item.thumbnail) {
                const uri = cleanPath(item.thumbnail);
                const ytId = getYTID(uri);
                if(ytId) {
                    flowHTML += `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1&loop=1&playlist=${ytId}" allowfullscreen style="width:100%;aspect-ratio:16/9;border:none;"></iframe>`;
                } else if(isVid(uri)) {
                    flowHTML += `<video src="${uri}" muted loop autoplay playsinline style="width:100%;"></video>`;
                } else {
                    flowHTML += `<img src="${uri}" alt="">`;
                }
            }

            // 2. Continuous Images (Card News style list)
            if(item.images && item.images.length) {
                item.images.forEach(img => {
                    const src = (typeof img === 'string') ? img : (img.image_path || img.url);
                    if (!src || src === item.thumbnail) return;
                    const uri = cleanPath(src);
                    const ytId = getYTID(uri);
                    
                    if(ytId) {
                        flowHTML += `<iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen style="width:100%;aspect-ratio:16/9;border:none;"></iframe>`;
                    } else if(isVid(uri)) {
                        flowHTML += `<video src="${uri}" muted loop autoplay playsinline style="width:100%;"></video>`;
                    } else {
                        flowHTML += `<img src="${uri}" alt="">`;
                    }
                });
            }
            flow.innerHTML = flowHTML;

        } catch (e) { console.error('Load Error:', e); }
    }
    loadCase();

    window.addEventListener('scroll', () => document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 50));
    const toggleMobileMenu = () => { const m = document.getElementById('mobile-menu'); if(m){ m.classList.toggle('on'); document.body.style.overflow = m.classList.contains('on') ? 'hidden' : ''; } };
    document.getElementById('nav-toggle')?.addEventListener('click', toggleMobileMenu);
    document.getElementById('close-mobile')?.addEventListener('click', toggleMobileMenu);
    document.querySelectorAll('.mobile-links a').forEach(l => l.addEventListener('click', toggleMobileMenu));
</script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
