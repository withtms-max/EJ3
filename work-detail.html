<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE 3 STUDIO | Case Study</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #0066ff;
    --bg: #000;
    --surface: #0a0a0a;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard', sans-serif;overflow-x:hidden;word-break:keep-all;}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;z-index:1000;transition:.3s;}
nav.scrolled{background:rgba(5,5,5,.9);backdrop-filter:blur(12px);padding:1rem 3rem;box-shadow:0 4px 20px rgba(0,0,0,.3);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--primary);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links li a{color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;text-decoration:none;transition:.2s;}
.nav-links li a:hover, .nav-links li a.active{color:var(--primary);}

/* HERO */
.case-hero {
    min-height: 70vh;
    display: flex;
    align-items: flex-end;
    padding: 12rem 3rem 5rem;
    position: relative;
    overflow: hidden;
    background: #050505;
}
.hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.2;
    filter: blur(40px);
    transform: scale(1.1);
}
.hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, #000 0%, transparent 100%);
    z-index: 1;
}
.hero-container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; width: 100%; }
.hero-cat { color: var(--primary); font-size: 0.8rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.5rem; }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; line-height: 1.05; margin-bottom: 2rem; letter-spacing: -0.04em; }
.hero-meta { display: flex; gap: 3rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; }
.hero-meta span i { color: var(--primary); margin-right: 0.6rem; }

/* CONTENT */
.case-body { padding: 6rem 3rem 10rem; }
.case-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 6rem; align-items: start; }

.section-h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; letter-spacing: -0.02em; }
.section-p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.9; margin-bottom: 4rem; }

.case-sidebar { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 2rem; padding: 2.5rem; position: sticky; top: 120px; }
.side-item { margin-bottom: 2rem; }
.side-label { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.side-val { font-size: 1rem; font-weight: 700; color: #fff; }

.img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 4rem; }
.img-grid img { width: 100%; border-radius: 1.5rem; border: 1px solid var(--border); transition: 0.3s; }
.img-grid img:hover { border-color: var(--primary); }

.back-btn { display: inline-flex; align-items: center; gap: 0.8rem; color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 0.9rem; margin-bottom: 3rem; transition: 0.2s; }
.back-btn:hover { color: var(--primary); }

/* FOOTER */
footer { padding: 6rem 3rem; border-top: 1px solid var(--border); text-align: center; }
.footer-logo { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; text-decoration: none; display: inline-block; }
.footer-logo span { color: var(--primary); }
.footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase; }

@media(max-width: 992px) {
    .case-container { grid-template-columns: 1fr; }
    .case-sidebar { position: static; }
    .img-grid { grid-template-columns: 1fr; }
    .hero-meta { flex-direction: column; gap: 1rem; }
}
</style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-logo">THE <span>3</span> STUDIO</a>
  <ul class="nav-links">
    <li><a href="index.html">홈</a></li>
    <li><a href="about.html">포트폴리오</a></li>
    <li><a href="services.html">서비스</a></li>
    <li><a href="index.html#team">전문가</a></li>
    <li><a href="contact.html">문의</a></li>
  </ul>
</nav>

<section class="case-hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-container">
        <p class="hero-cat" id="case-category">Loading...</p>
        <h1 class="hero-title" id="case-title">-</h1>
        <div class="hero-meta">
            <span><i class="fa fa-building"></i> <span id="case-client">-</span></span>
            <span><i class="fa fa-calendar-days"></i> <span id="case-year">-</span></span>
        </div>
    </div>
</section>

<div class="case-body">
    <div class="case-container">
        <div class="case-main">
            <a href="about.html" class="back-btn"><i class="fa fa-arrow-left"></i> 목록으로 돌아가기</a>
            
            <div id="section-challenge" style="display:none">
                <h2 class="section-h2">The Challenge</h2>
                <p class="section-p" id="text-challenge"></p>
            </div>

            <div id="section-solution" style="display:none">
                <h2 class="section-h2">Our Solution</h2>
                <p class="section-p" id="text-solution"></p>
            </div>

            <div id="section-result" style="display:none">
                <h2 class="section-h2">The Result</h2>
                <p class="section-p" id="text-result"></p>
            </div>

            <div class="img-grid" id="image-grid" style="display:none"></div>
        </div>

        <aside class="case-sidebar">
            <div class="side-item">
                <div class="side-label">Category</div>
                <div class="side-val" id="s-category">-</div>
            </div>
            <div class="side-item">
                <div class="side-label">Client</div>
                <div class="side-val" id="s-client">-</div>
            </div>
            <div class="side-item">
                <div class="side-label">Execution Year</div>
                <div class="side-val" id="s-year">-</div>
            </div>
            <div class="side-item">
                <div class="side-label">Project Tags</div>
                <div class="side-val" id="s-tags" style="font-weight: 500; font-size: 0.85rem; color: var(--text-dim);">-</div>
            </div>
            <a href="contact.html" style="display: block; background: var(--primary); color: #fff; text-align: center; padding: 1.2rem; border-radius: 1rem; text-decoration: none; font-weight: 800; font-size: 0.9rem; margin-top: 2rem;">프로젝트 문의하기</a>
        </aside>
    </div>
</div>

<footer>
    <a href="index.html" class="footer-logo">THE <span>3</span> STUDIO</a>
    <p class="footer-copy">© 2026 THE 3 STUDIO. ALL RIGHTS RESERVED.</p>
</footer>

<script>
    const categoryLabel = { branding: 'Branding Design', consulting: 'Business Consulting', video: 'Video Production', integrated: 'Integrated Solution' };
    const slug = new URLSearchParams(location.search).get('slug');

    async function loadCase() {
        if (!slug) { location.href = 'about.html'; return; }
        try {
            const res = await fetch(`/api/api.php?action=portfolio_detail&slug=${slug}`);
            const item = await res.json();
            if (item.error) { location.href = 'about.html'; return; }

            document.title = `THE 3 STUDIO | ${item.title}`;
            document.getElementById('case-category').textContent = categoryLabel[item.category] || item.category;
            document.getElementById('case-title').textContent = item.title;
            document.getElementById('case-client').textContent = item.client || '-';
            document.getElementById('case-year').textContent = item.year || '-';
            document.getElementById('s-category').textContent = categoryLabel[item.category] || item.category;
            document.getElementById('s-client').textContent = item.client || '-';
            document.getElementById('s-year').textContent = item.year || '-';

            const heroImg = item.hero_image || item.thumbnail;
            if (heroImg) {
                const hUri = heroImg.startsWith('http') ? heroImg : '/' + heroImg;
                const isHeroVid = /\.(mp4|webm|avi|mov)$/i.test(heroImg);
                if(isHeroVid) {
                    document.getElementById('hero-bg').innerHTML = `<video src="${hUri}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;opacity:0.3;"></video>`;
                    document.getElementById('hero-bg').style.backgroundImage = 'none';
                } else {
                    document.getElementById('hero-bg').style.backgroundImage = `url(${hUri})`;
                }
            }

            const setField = (id, wrapId, val) => {
                if(val) {
                    document.getElementById(id).textContent = val;
                    document.getElementById(wrapId).style.display = 'block';
                }
            };
            setField('text-challenge', 'section-challenge', item.challenge);
            setField('text-solution', 'section-solution', item.solution);
            setField('text-result', 'section-result', item.result);
            if(item.tags) document.getElementById('s-tags').textContent = item.tags;

            if (item.images && item.images.length) {
                const grid = document.getElementById('image-grid');
                grid.style.display = 'grid';
                grid.innerHTML = item.images.map(img => {
                    const iUri = img.image_path.startsWith('http') ? img.image_path : '/' + img.image_path;
                    const isVid = /\.(mp4|webm|avi|mov)$/i.test(img.image_path);
                    return isVid 
                        ? `<video src="${iUri}" muted loop autoplay playsinline style="width:100%;border-radius:1.5rem;border:1px solid var(--border);"></video>`
                        : `<img src="${iUri}" alt="${item.title}">`;
                }).join('');
            }
        } catch (e) {
            console.error(e);
        }
    }
    loadCase();

    window.addEventListener('scroll', () => {
        const navbar = document.getElementById('navbar');
        if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
    });
</script>
</body>
</html>
