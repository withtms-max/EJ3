<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE 3 STUDIO | Work 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #0066ff;
    --transition: .3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* --------------------------------------------------------------------------
   [PART 1] DARK THEME - THE3 NAVY/RED (Default Isle)
   -------------------------------------------------------------------------- */
body:not(.light-mode) {
    --bg-main: #0B1939;
    --bg-card: #12224A;
    --bg-darker: #050505;
    --text-main: #FFFFFF;
    --text-dim: rgba(255, 255, 255, 0.5);
    --border: rgba(255, 255, 255, 0.08);
}
body:not(.light-mode) .nav-logo { color: #fff; }
body:not(.light-mode) .filter-tab:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

/* --------------------------------------------------------------------------
   [PART 2] LIGHT THEME - THE3 WHITE/RED (Isolated Island)
   -------------------------------------------------------------------------- */
body.light-mode {
    --bg-main: #F4F6F8;
    --bg-card: #FFFFFF;
    --bg-darker: #FFFFFF;
    --text-main: #111111;
    --text-dim: #6C757D;
    --border: rgba(0, 0, 0, 0.1);
}
body.light-mode .nav-logo { color: #111; }
body.light-mode .nav-links li a { color: #555 !important; }
body.light-mode .nav-links li a.active { color: var(--primary) !important; }
body.light-mode .nav.scrolled { background: rgba(255,255,255,0.98); }
body.light-mode .hero-title { color: #111; }
body.light-mode .hero-desc { color: #444; }
body.light-mode .filter-tab { color: #555; border-color: rgba(0,0,0,0.1); }
body.light-mode .filter-tab:hover { color: #111; border-color: #111; }
body.light-mode .filter-tab.active { color: #fff; }
body.light-mode .sort-tab { color: #888; border-color: rgba(0,0,0,0.05); }
body.light-mode .sort-tab.active { color: var(--primary); border-color: var(--primary); }
body.light-mode .work-title { color: #111; }
body.light-mode .work-card:hover { border-color: var(--primary); }
body.light-mode footer { background: #fff; }
body.light-mode .footer-logo { color: #111; }
body.light-mode .footer-copy { color: rgba(0,0,0,0.4); }

/* --------------------------------------------------------------------------
   [PART 0] COMMON SKELETON (Always Applied)
   -------------------------------------------------------------------------- */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-main);color:var(--text-main);font-family:'Pretendard', sans-serif;overflow-x:hidden;word-break:keep-all; transition: background 0.5s ease;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background: var(--bg-main);}
::-webkit-scrollbar-thumb{background: #222; border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background: #000;}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;z-index:1000;transition:.3s;}
nav.scrolled{background:var(--bg-card);backdrop-filter:blur(12px);padding:1rem 3rem;box-shadow:0 4px 20px rgba(0,0,0,.3);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:inherit;text-decoration:none;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links li a{color:var(--text-dim);font-size:.85rem;font-weight:700;text-decoration:none;transition:.2s;}
.nav-links li a:hover, .nav-links li a.active{color:var(--primary);}
.nav-cta{display:inline-block;background:linear-gradient(135deg, #007aff 0%, #00c6ff 100%);color:#fff;padding:.7rem 1.8rem;border-radius:999px;font-size:.85rem;font-weight:800;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;transition:.3s;box-shadow: 0 10px 20px rgba(0, 102, 255, 0.25);border: none;}
.nav-cta:hover{transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 102, 255, 0.4);}

/* HERO */
.work-hero { 
    position: relative;
    padding: 10rem 2rem 6rem; 
    text-align: center; 
    overflow: hidden;
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.hero-bg-media {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0;
    transition: 1s cubic-bezier(0.16, 1, 0.3, 1);
    transform: scale(1.1);
    filter: blur(20px) brightness(0.4);
}
.hero-bg-media.active {
    opacity: 0.6;
    transform: scale(1);
    filter: blur(0px) brightness(0.5);
}
.hero-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 0%, var(--bg-main) 90%), 
                linear-gradient(to bottom, var(--bg-main) 0%, transparent 40%, var(--bg-main) 100%);
    z-index: 1;
}
.hero-content { position: relative; z-index: 2; transition: 0.5s; }
.hero-label { color: var(--primary); font-size: 0.85rem; font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 2rem; display: block; text-shadow: 0 0 20px rgba(0,102,255,0.4); }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 950; line-height: 1.1; margin-bottom: 2rem; letter-spacing: -0.05em; }
.hero-desc { font-size: 1.2rem; color: var(--text-dim); line-height: 1.8; max-width: 800px; margin: 0 auto; font-weight: 500; word-break: keep-all; letter-spacing: 0.02em; }

/* FILTERS */
.filter-sect { padding: 2rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg-darker); position: sticky; top: 80px; z-index: 100; }
.filter-tabs { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
.filter-tab { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.6rem 1.5rem; border-radius: 999px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
.filter-tab.active { background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); border-color: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0, 102, 255, 0.3); }

/* SORTING UI */
.sort-wrap { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
.sort-tab { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.5rem 1.2rem; border-radius: 999px; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
.sort-tab:hover { color: var(--text-main); border-color: var(--primary); }
.sort-tab.active { background: rgba(255,255,255,0.05); border-color: var(--primary); color: var(--primary); }

/* GRID */
.work-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 4rem 2rem 8rem; }
.work-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1.5rem; overflow: hidden; text-decoration: none; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.work-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.work-thumb-wrap { width: 100%; aspect-ratio: 4/3; background: #111; overflow: hidden; position: relative; }
.work-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
.work-card:hover .work-thumb-wrap img { transform: scale(1.1); }
.yt-play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); transition: 0.3s; pointer-events: none; }
.yt-play-icon i { font-size: 3rem; color: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); transition: 0.3s; }
.work-card:hover .yt-play-icon { background: rgba(0,0,0,0.15); }
.work-card:hover .yt-play-icon i { transform: scale(1.15); color: #ff4444; }
.work-info { padding: 1.8rem; }
.work-cat { color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
.work-title { font-size: 1.3rem; font-weight: 800; color: inherit; margin-bottom: 0.5rem; }
.work-meta { font-size: 0.85rem; color: var(--text-dim); }

/* FOOTER */
footer { padding: 4rem 2rem; border-top: 1px solid var(--border); text-align: center; }
.footer-logo { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; color: inherit; text-decoration: none; display: inline-block; }
.footer-logo span { color: var(--primary); }
.footer-copy { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

/* FADE UP */
.fu { opacity: 0; transform: translateY(30px); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
.fu.vis { opacity: 1; transform: translateY(0); }

/* MOBILE MENU & RESPONSIVE FIXES */
.nav-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; z-index: 1001; }
.mobile-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(-100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; visibility: hidden; }
.mobile-menu.on { transform: translateY(0); opacity: 1; visibility: visible; }
.mobile-links { list-style: none; padding: 0; text-align: center; }
.mobile-links li { margin: 2rem 0; }
.mobile-links li a { color: #fff; font-size: 1.8rem; font-weight: 800; text-decoration: none; transition: 0.3s; }
.mobile-links li a:active { color: var(--primary); }
.close-mobile { position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }

@media(max-width: 640px) {
  nav { position: absolute; padding: 1.5rem; }
  .filter-sect { position: relative; top: 0; padding: 1.2rem 1rem; }
  .work-hero { padding: 6rem 1.5rem 3rem; }
  .nav-links, .nav-cta { display: none; }
  .nav-toggle { display: block; }
  body.light-mode .nav-toggle { color: #000; }
}
</style>
</head>

<script type="module">
    import { db, collection, getDocs } from './js/firebase-init.js';
    const mobileMenu = document.getElementById('mobile-menu');
    
    // Navbar Scroll
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (nav) { // Check if nav exists before manipulating
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
      }
    });

    // Mobile Menu Toggle
    const toggleMobileMenu = () => {
      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenu) { // Check if mobileMenu exists
        mobileMenu.classList.toggle('on');
        document.body.style.overflow = mobileMenu.classList.contains('on') ? 'hidden' : '';
      }
    };
    document.getElementById('nav-toggle').addEventListener('click', toggleMobileMenu);
    document.getElementById('close-mobile').addEventListener('click', toggleMobileMenu);
    document.querySelectorAll('.mobile-links a').forEach(link => {
      link.addEventListener('click', toggleMobileMenu);
    });

    // Intersection Observer for Fade Up
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('vis'); // Changed 'visible' to 'vis' to match existing CSS
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fu').forEach(el => observer.observe(el));

    // 이미지 로드 실패 시 fallback (전역 함수로 onerror 따옴표 충돌 방지)
    window._imgFallback = function(el) {
        el.onerror = null;
        el.style.background = '#111';
        el.style.opacity = '0';
    };

    let allItems = [];
    const categoryLabel = { 
        calligraphy: '캘리그라피 상호디자인', 
        video: '내가게 돈되는 영상만들기', 
        storyboard: '우리매장 스토리보드', 
        photo: '내가게의 사진촬영', 
        character: '내가게의 캐릭터만들기' 
    };

    // YouTube 헬퍼 함수
    const isYouTube = (url) => {
        if(!url) return false;
        return /(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})/.test(url);
    };
    const getYouTubeId = (url) => {
        const m = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/|youtube\.com\/live\/)?([\w-]{11})/);
        return m ? m[1] : null;
    };
    const getYouTubeThumbnail = (url) => {
        const id = getYouTubeId(url);
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
    };

    let currentCat = 'all';
    let currentSort = 'latest';

    async function applyFilterAndSort() {
        let filtered = currentCat === 'all' ? allItems : allItems.filter(i => i.category === currentCat);
        
        // Sorting logic
        if (currentSort === 'latest') {
            filtered.sort((a, b) => {
                const yA = parseInt(a.year) || 0;
                const yB = parseInt(b.year) || 0;
                if (yA !== yB) return yB - yA; // 연도 내림차순 (최신 연도 우선)
                const sA = parseInt(a.sort_order) || 999;
                const sB = parseInt(b.sort_order) || 999;
                return sA - sB; // 노출 순서 오름차순 (작은 숫자가 우선)
            });
        } else if (currentSort === 'year') {
            filtered.sort((a, b) => {
                const yA = parseInt(a.year) || 0;
                const yB = parseInt(b.year) || 0;
                if (yA !== yB) return yB - yA; // 연도 내림차순
                const sA = parseInt(a.sort_order) || 999;
                const sB = parseInt(b.sort_order) || 999;
                return sA - sB; 
            });
        }
        
        const grid = document.getElementById('work-grid');
        if (!filtered.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">아직 등록된 작업물이 없습니다.</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(item => {
            let thumb = item.thumbnail || '';
            // 만약 썸네일이 비어있다면 images에서 유튜브 추출 시도
            if (!thumb && item.images && item.images.length) {
                const getYTID = (url) => url.match(/(?:https?:)?\/\/(?:www\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/)?.[1];
                for (const img of item.images) {
                    const src = (typeof img === 'string') ? img : (img.image_path || img.url || '');
                    if (getYTID(src)) { thumb = src; break; }
                }
            }

            if (thumb && !thumb.startsWith('http') && !thumb.startsWith('/')) thumb = '/' + thumb;
            const isVideoFile = /\.(mp4|webm|avi|mov)$/i.test(thumb.split('?')[0]);
            const isYT = isYouTube(thumb);
            let thumbHTML;
            if(isYT) {
                const ytThumb = getYouTubeThumbnail(thumb);
                thumbHTML = `<img src="${ytThumb}" alt="${item.title}" onerror="_imgFallback(this)"><div class="yt-play-icon"><i class="fa fa-circle-play"></i></div>`;
            } else if(isVideoFile) {
                thumbHTML = `<video src="${thumb}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
            } else if(thumb) {
                thumbHTML = `<img src="${thumb}" alt="${item.title}" onerror="_imgFallback(this)">`;
            } else {
                thumbHTML = `<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.1);"><i class="fa fa-image" style="font-size:2rem;"></i></div>`;
            }
            const linkParam = item.slug ? `slug=${encodeURIComponent(item.slug)}` : `id=${encodeURIComponent(item.id)}`;
            return `
            <a href="work-detail.html?${linkParam}" class="work-card fu">
                <div class="work-thumb-wrap">
                    ${thumbHTML}
                </div>
                <div class="work-info">
                    <div class="work-cat">${categoryLabel[item.category] || item.category}</div>
                    <h3 class="work-title">${item.title}</h3>
                    <div class="work-meta">${item.client ? item.client + ' · ' : ''}${item.year || ''}</div>
                </div>
            </a>
        `}).join('');
        document.querySelectorAll('.work-card.fu').forEach(el => observer.observe(el));
    }

    async function loadWork() {
        try {
            if (!allItems.length) {
                const qSnap = await getDocs(collection(db, 'portfolio'));
                allItems = [];
                qSnap.forEach(doc => {
                    const data = doc.data();
                    if (data.status !== 'Draft' && data.show_in_list !== '0') {
                        allItems.push({ ...data, id: doc.id });
                    }
                });
            }
            applyFilterAndSort();
        } catch (e) {
            document.getElementById('work-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">데이터를 불러오지 못했습니다.</div>';
        }
    }

    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentCat = this.dataset.cat;
            applyFilterAndSort();
            updateCinematicHero(currentCat);
        });
    });

    let heroThemes = {
        all: { label: 'Selected Works', title: '압도적 성과로 증명하는<br><span style="background:linear-gradient(to right, #fff, #0066ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">포트폴리오</span>', desc: '각 프로젝트는 단순한 작업물을 넘어, 브랜드의 성장을 견인하는 강력한 도구입니다.', img: 'https://images.unsplash.com/photo-1544256718-3bcf237f3974?q=80&w=2071' },
        calligraphy: { label: '01 / Branding Face', title: '세상에 단 하나뿐인<br>브랜드의 얼굴', desc: '장인의 필치로 브랜드의 영혼을 담아 독보적인 첫인상을 설계합니다.', img: 'https://images.unsplash.com/photo-1513519245088-0e12902e5a38?q=80&w=2070' },
        video: { label: '02 / Performance Reel', title: '매출로 즉시 직결되는<br>영상 마케팅', desc: '단 1초 만에 고객의 욕망을 건드리는 폭발적인 시각적 파괴력을 경험하세요.', img: 'https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=2071' },
        storyboard: { label: '03 / Strategic Story', title: '성공을 위해 치밀하게<br>설계된 기획', desc: '단순한 그림이 아닌, 비즈니스 성장을 위한 가장 완벽한 시나리오를 작성합니다.', img: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070' },
        photo: { label: '04 / Visual Essence', title: '가장 화려하게 기록되는<br>브랜드의 순간', desc: '구도와 채광, 찰나의 순간을 통해 제품과 서비스의 가치를 영원으로 기록합니다.', img: 'https://images.unsplash.com/photo-1452587925148-ce544e77e70d?q=80&w=2074' },
        character: { label: '05 / Brand Persona', title: '무한한 확장이 가능한<br>브랜드 페르소나', desc: '고객과 친구가 되는 캐릭터를 통해 독자적인 세계관과 강력한 팬덤을 구축합니다.', img: 'https://images.unsplash.com/photo-1560415741-604ce35144b6?q=80&w=2070' }
    };

    async function syncHeroSettings() {
        try {
            const { getDoc, doc } = await import('./js/firebase-init.js');
            const snap = await getDoc(doc(db, 'settings', 'portfolio_hero'));
            if(snap.exists()) {
                const cloudThemes = snap.data().themes;
                // 클라우드 데이터가 있다면 기본값 덮어쓰기
                Object.keys(cloudThemes).forEach(k => {
                    if(cloudThemes[k]) heroThemes[k] = cloudThemes[k];
                });
            }
        } catch(e) { console.warn('Hero Settings Sync Failed:', e); }
    }

    function updateCinematicHero(cat) {
        const theme = heroThemes[cat] || heroThemes.all;
        const hLabel = document.getElementById('h-label');
        const hTitle = document.getElementById('h-title');
        const hDesc = document.getElementById('h-desc');
        const hBg = document.getElementById('hero-bg');
        const hContent = document.querySelector('.hero-content');

        // Cinematic Transition Out
        hContent.style.opacity = '0';
        hContent.style.transform = 'translateY(15px)';
        hBg.classList.remove('active');

        setTimeout(() => {
            hLabel.innerText = theme.label;
            hTitle.innerHTML = theme.title;
            hDesc.innerText = theme.desc;
            
            const mediaUrl = theme.img || '';
            const isVid = /\.(mp4|webm|mov|avi)$/i.test(mediaUrl.split('?')[0].split('#')[0]);

            // Clear previous background (image or video)
            hBg.innerHTML = '';
            hBg.style.backgroundImage = 'none';

            if (isVid) {
                const videoEl = document.createElement('video');
                videoEl.src = mediaUrl;
                videoEl.autoplay = true;
                videoEl.muted = true;
                videoEl.loop = true;
                // Add attributes via setAttribute for better mobile browser compliance
                videoEl.setAttribute('playsinline', '');
                videoEl.setAttribute('webkit-playsinline', '');
                videoEl.style.width = '100%';
                videoEl.style.height = '100%';
                videoEl.style.objectFit = 'cover';
                
                // [FIX] Wait for video to be ready before fading in (Prevents black frame flicker)
                videoEl.oncanplay = () => {
                    hBg.classList.add('active');
                    videoEl.play().catch(e => console.warn('Video play failed:', e));
                };

                hBg.appendChild(videoEl);
            } else {
                hBg.style.backgroundImage = `url('${mediaUrl}')`;
                hBg.style.backgroundSize = 'cover';
                hBg.style.backgroundPosition = 'center';
                // Static image: Just fade in
                setTimeout(() => hBg.classList.add('active'), 100);
            }
            
            // Text Content Fade In
            setTimeout(() => {
                hContent.style.opacity = '1';
                hContent.style.transform = 'translateY(0)';
            }, 100);
        }, 400);
    }

    document.querySelectorAll('.sort-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentSort = this.dataset.sort;
            applyFilterAndSort();
        });
    });

    // Initial Load
    syncHeroSettings().then(() => {
        loadWork().then(() => {
            // URL 파라미터(?filter=category)가 있으면 해당 탭 자동 클릭
            const urlParams = new URLSearchParams(window.location.search);
            const filterParam = urlParams.get('filter');
            if (filterParam) {
                const targetTab = document.querySelector(`.filter-tab[data-cat="${filterParam}"]`);
                if (targetTab) targetTab.click();
            } else {
                updateCinematicHero('all'); // 기본 테마 적용
            }
        });
    });
    
    // Initial Fade-up
    document.querySelectorAll('.fu').forEach(el => observer.observe(el));
</script>
