<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE 3 STUDIO | Work 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #0066ff;
    --bg: #000;
    --surface: #0a0a0a;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard', sans-serif;overflow-x:hidden;word-break:keep-all;}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;z-index:1000;transition:.3s;}
nav.scrolled{background:rgba(5,5,5,.9);backdrop-filter:blur(12px);padding:1rem 3rem;box-shadow:0 4px 20px rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,0.05);}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:#fff;text-decoration:none;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links li a{color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;text-decoration:none;transition:.2s;}
.nav-links li a:hover, .nav-links li a.active{color:#007aff;}
.nav-cta{display:inline-block;background:linear-gradient(135deg, #007aff 0%, #00c6ff 100%);color:#fff;padding:.7rem 1.8rem;border-radius:999px;font-size:.85rem;font-weight:800;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;transition:.3s;box-shadow: 0 10px 20px rgba(0, 102, 255, 0.25);border: none;}
.nav-cta:hover{transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 102, 255, 0.4);}

/* HERO */
.work-hero { padding: 8rem 2rem 4rem; text-align: center; background: radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.05) 0%, transparent 70%); }
.hero-label { color: var(--primary); font-size: 0.8rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.5rem; }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -0.04em; }
.hero-desc { font-size: 1.1rem; color: var(--text-dim); line-height: 1.8; max-width: 600px; margin: 0 auto; }

/* FILTERS */
.filter-sect { padding: 2rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: #050505; position: sticky; top: 80px; z-index: 100; }
.filter-tabs { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
.filter-tab { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.6rem 1.5rem; border-radius: 999px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
.filter-tab:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.filter-tab.active { background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); border-color: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0, 102, 255, 0.3); }

/* SORTING UI */
.sort-wrap { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
.sort-tab { background: transparent; border: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); padding: 0.5rem 1.2rem; border-radius: 999px; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
.sort-tab:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
.sort-tab.active { background: rgba(255,255,255,0.05); border-color: var(--primary); color: var(--primary); }

body.light-mode .sort-tab { border-color: rgba(0,0,0,0.05); color: rgba(0,0,0,0.3); }
body.light-mode .sort-tab:hover { color: #000; }
body.light-mode .sort-tab.active { background: rgba(0,0,0,0.03); border-color: #0066ff; color: #0066ff; }

/* GRID */
.work-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 4rem 2rem 8rem; }
.work-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 1.5rem; overflow: hidden; text-decoration: none; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.work-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.work-thumb-wrap { width: 100%; aspect-ratio: 4/3; background: #111; overflow: hidden; position: relative; }
.work-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
.work-card:hover .work-thumb-wrap img { transform: scale(1.1); }
.yt-play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); transition: 0.3s; pointer-events: none; }
.yt-play-icon i { font-size: 3rem; color: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); transition: 0.3s; }
.work-card:hover .yt-play-icon { background: rgba(0,0,0,0.15); }
.work-card:hover .yt-play-icon i { transform: scale(1.15); color: #ff4444; }
.work-info { padding: 1.8rem; }
.work-cat { color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
.work-title { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem; }
.work-meta { font-size: 0.85rem; color: var(--text-dim); }

/* FOOTER */
footer { padding: 4rem 2rem; border-top: 1px solid var(--border); text-align: center; }
.footer-logo { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; text-decoration: none; display: inline-block; }
.footer-logo span { color: var(--primary); }
.footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase; }

/* FADE UP */
.fu { opacity: 0; transform: translateY(30px); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
.fu.vis { opacity: 1; transform: translateY(0); }

@media(max-width: 992px) { .work-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width: 640px) { .work-grid { grid-template-columns: 1fr; } .nav-links{display:none;} }

/* LIGHT MODE SUPPORT - PREMIUM WHITE THEME */
body.light-mode { background: #fff; color: #111; }
/* NAV LIGHT MODE OVERRIDES */
body.light-mode nav:not(.scrolled) .nav-logo { color: #111 !important; }
body.light-mode nav:not(.scrolled) .nav-links li a { color: rgba(0,0,0,0.6) !important; }
body.light-mode nav:not(.scrolled) .nav-links li a:hover, body.light-mode nav:not(.scrolled) .nav-links li a.active { color: #0066ff !important; }
body.light-mode nav.scrolled { background: rgba(255,255,255,0.95) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important; border-bottom-color: rgba(0,0,0,0.05) !important; }
body.light-mode nav.scrolled .nav-logo { color: #111 !important; }
body.light-mode nav.scrolled .nav-links li a { color: rgba(0,0,0,0.6) !important; }
body.light-mode .nav-cta { background: linear-gradient(135deg, #111 0%, #0066ff 100%); color: #fff; border: none; }

body.light-mode .hero-title { color: #111 !important; }
body.light-mode .hero-desc { color: #555 !important; font-weight: 600 !important; }
body.light-mode .filter-sect { background: #fbfcfe; border-color: rgba(0,0,0,0.05); }
body.light-mode .filter-tab { border-color: rgba(0,0,0,0.1); color: #666; background: #fff; }
body.light-mode .filter-tab.active { background: #0066ff !important; color: #fff !important; border-color: #0066ff !important; box-shadow: 0 10px 20px rgba(0,102,255,0.2); }
body.light-mode .work-card { background: #fff; border-color: rgba(0,0,0,0.06); box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
body.light-mode .work-title { color: #111 !important; font-weight: 900 !important; }
body.light-mode .work-meta { color: #555 !important; font-weight: 700 !important; }
body.light-mode .work-thumb-wrap { background: #f1f3f6; }
body.light-mode footer { background: #fbfcfe; border-top-color: rgba(0,0,0,0.05); }
body.light-mode .footer-logo { color: #111 !important; }
body.light-mode .footer-copy { color: rgba(0,0,0,0.4) !important; }

/* LIGHT MODE SUPPORT - CSS VARS */
body.light-mode {
    --bg: #fff;
    --surface: #f8f9fa;
    --border: rgba(0,0,0,0.08);
    --text: #111;
    --text-dim: #666;
}

/* MOBILE MENU & RESPONSIVE FIXES */
.nav-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; z-index: 1001; }
.mobile-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(-100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; visibility: hidden; }
.mobile-menu.on { transform: translateY(0); opacity: 1; visibility: visible; }
.mobile-links { list-style: none; padding: 0; text-align: center; }
.mobile-links li { margin: 2rem 0; }
.mobile-links li a { color: #fff; font-size: 1.8rem; font-weight: 800; text-decoration: none; transition: 0.3s; }
.mobile-links li a:active { color: var(--primary); }
.close-mobile { position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }

@media(max-width: 640px) {
  nav { position: absolute; padding: 1.5rem; }
  .filter-sect { position: relative; top: 0; padding: 1.2rem 1rem; }
  .work-hero { padding: 6rem 1.5rem 3rem; }
  .nav-links, .nav-cta { display: none; }
  .nav-toggle { display: block; }
  body.light-mode .nav-toggle { color: #000; }
}
</style>
</head>
<body>
<script>
  (function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
      document.documentElement.classList.add('light-mode');
    }
  })();
</script>
<script type="module" src="js/theme.js"></script>

<nav id="navbar">
  <a href="index.html" class="nav-logo">THE 3 STUDIO</a>
  <div class="nav-toggle" id="nav-toggle">
    <i class="fa fa-bars"></i>
  </div>
  <ul class="nav-links">
    <li><a href="index.html#home">홈</a></li>
    <li><a href="index.html#gallery">포트폴리오</a></li>
    <li><a href="index.html#team">전문가 서비스</a></li>
    <li><a href="index.html#journey">스토리</a></li>
  </ul>
  <a href="index.html#contact" class="nav-cta">문의하기</a>
</nav>

<!-- MOBILE MENU OVERLAY -->
<div class="mobile-menu" id="mobile-menu">
  <button class="close-mobile" id="close-mobile">&times;</button>
  <ul class="mobile-links">
    <li><a href="index.html#home" onclick="toggleMobileMenu()">홈</a></li>
    <li><a href="work.html" onclick="toggleMobileMenu()">포트폴리오</a></li>
    <li><a href="index.html#team" onclick="toggleMobileMenu()">전문가 서비스</a></li>
    <li><a href="index.html#journey" onclick="toggleMobileMenu()">스토리</a></li>
    <li><a href="index.html#contact" onclick="toggleMobileMenu()">문의하기</a></li>
  </ul>
</div>

<section class="work-hero">
    <div class="fu">
        <p class="hero-label">Selected Works</p>
        <h1 class="hero-title">압도적 성과로 증명하는<br>포트폴리오</h1>
        <p class="hero-desc">각 프로젝트는 단순한 작업물을 넘어, 브랜드의 성장을 견인하는 강력한 도구입니다.</p>
    </div>
</section>

<section class="filter-sect">
    <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-cat="all">All</button>
        <button class="filter-tab" data-cat="branding">Branding Design</button>
        <button class="filter-tab" data-cat="consulting">Business Consulting</button>
        <button class="filter-tab" data-cat="video">Video Production</button>
        <button class="filter-tab" data-cat="integrated">Integrated</button>
    </div>
    <div class="sort-wrap">
        <button class="sort-tab active" data-sort="latest">최신순</button>
        <button class="sort-tab" data-sort="year">연도별</button>
    </div>
</section>

<div class="work-grid" id="work-grid">
    <div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">데이터를 불러오는 중...</div>
</div>

<footer>
    <a href="index.html" class="footer-logo">THE <span>3</span> STUDIO</a>
    <p class="footer-copy">© 2026 THE 3 STUDIO. ALL RIGHTS RESERVED.</p>
</footer>

<script type="module">
    import { db, collection, getDocs } from './js/firebase-init.js';
    const mobileMenu = document.getElementById('mobile-menu');
    
    // Navbar Scroll
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (nav) { // Check if nav exists before manipulating
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
      }
    });

    // Mobile Menu Toggle
    const toggleMobileMenu = () => {
      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenu) { // Check if mobileMenu exists
        mobileMenu.classList.toggle('on');
        document.body.style.overflow = mobileMenu.classList.contains('on') ? 'hidden' : '';
      }
    };
    document.getElementById('nav-toggle').addEventListener('click', toggleMobileMenu);
    document.getElementById('close-mobile').addEventListener('click', toggleMobileMenu);
    document.querySelectorAll('.mobile-links a').forEach(link => {
      link.addEventListener('click', toggleMobileMenu);
    });

    // Intersection Observer for Fade Up
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('vis'); // Changed 'visible' to 'vis' to match existing CSS
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fu').forEach(el => observer.observe(el));

    // 이미지 로드 실패 시 fallback (전역 함수로 onerror 따옴표 충돌 방지)
    window._imgFallback = function(el) {
        el.onerror = null;
        el.style.background = '#111';
        el.style.opacity = '0';
    };

    let allItems = [];
    const categoryLabel = { branding: 'Branding Design', consulting: 'Business Consulting', video: 'Video Production', integrated: 'Integrated' };

    // YouTube 헬퍼 함수
    const isYouTube = (url) => {
        if(!url) return false;
        return /(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})/.test(url);
    };
    const getYouTubeId = (url) => {
        const m = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/|youtube\.com\/live\/)?([\w-]{11})/);
        return m ? m[1] : null;
    };
    const getYouTubeThumbnail = (url) => {
        const id = getYouTubeId(url);
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
    };

    let currentCat = 'all';
    let currentSort = 'latest';

    async function applyFilterAndSort() {
        let items = currentCat === 'all' ? allItems : allItems.filter(i => i.category === currentCat);
        
        // Sorting logic
        if (currentSort === 'latest') {
            items.sort((a, b) => {
                const yA = parseInt(a.year) || 0;
                const yB = parseInt(b.year) || 0;
                if (yA !== yB) return yB - yA; // 연도 내림차순 (최신 연도 우선)
                const sA = parseInt(a.sort_order) || 999;
                const sB = parseInt(b.sort_order) || 999;
                return sA - sB; // 노출 순서 오름차순 (작은 숫자가 우선)
            });
        } else if (currentSort === 'year') {
            items.sort((a, b) => {
                const yA = parseInt(a.year) || 0;
                const yB = parseInt(b.year) || 0;
                if (yA !== yB) return yB - yA; // 연도 내림차순
                const sA = parseInt(a.sort_order) || 999;
                const sB = parseInt(b.sort_order) || 999;
                return sA - sB; 
            });
        }
        
        const grid = document.getElementById('work-grid');
        if (!items.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">아직 등록된 작업물이 없습니다.</div>';
            return;
        }
        
        grid.innerHTML = items.map(item => {
            let thumb = item.thumbnail || '';
            if (thumb && !thumb.startsWith('http') && !thumb.startsWith('/')) thumb = '/' + thumb;
            const isVideoFile = /\.(mp4|webm|avi|mov)$/i.test(thumb.split('?')[0]);
            const isYT = isYouTube(thumb);
            let thumbHTML;
            if(isYT) {
                const ytThumb = getYouTubeThumbnail(thumb);
                thumbHTML = `<img src="${ytThumb}" alt="${item.title}" onerror="_imgFallback(this)"><div class="yt-play-icon"><i class="fa fa-circle-play"></i></div>`;
            } else if(isVideoFile) {
                thumbHTML = `<video src="${thumb}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
            } else if(thumb) {
                thumbHTML = `<img src="${thumb}" alt="${item.title}" onerror="_imgFallback(this)">`;
            } else {
                thumbHTML = `<div style="width:100%;height:100%;background:#111;"></div>`;
            }
            const linkParam = item.slug ? `slug=${item.slug}` : `id=${item.id}`;
            return `
            <a href="work-detail.html?${linkParam}" class="work-card fu">
                <div class="work-thumb-wrap">
                    ${thumbHTML}
                </div>
                <div class="work-info">
                    <div class="work-cat">${categoryLabel[item.category] || item.category}</div>
                    <h3 class="work-title">${item.title}</h3>
                    <div class="work-meta">${item.client ? item.client + ' · ' : ''}${item.year || ''}</div>
                </div>
            </a>
        `}).join('');
        document.querySelectorAll('.work-card.fu').forEach(el => observer.observe(el));
    }

    async function loadWork() {
        try {
            if (!allItems.length) {
                const qSnap = await getDocs(collection(db, 'portfolio'));
                allItems = [];
                qSnap.forEach(doc => {
                    const data = doc.data();
                    if (data.status !== 'Draft' && data.show_in_list !== '0') {
                        allItems.push({ ...data, id: doc.id });
                    }
                });
            }
            applyFilterAndSort();
        } catch (e) {
            document.getElementById('work-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">데이터를 불러오지 못했습니다.</div>';
        }
    }

    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentCat = this.dataset.cat;
            applyFilterAndSort();
        });
    });

    document.querySelectorAll('.sort-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentSort = this.dataset.sort;
            applyFilterAndSort();
        });
    });

    // Initial Load
    loadWork();
    
    // Initial Fade-up
    document.querySelectorAll('.fu').forEach(el => observer.observe(el));
</script>
</body>
</html>
