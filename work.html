<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE 3 STUDIO | Work 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #0066ff;
    --bg: #000;
    --surface: #0a0a0a;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard', sans-serif;overflow-x:hidden;word-break:keep-all;}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;z-index:1000;transition:.3s;}
nav.scrolled{background:rgba(5,5,5,.9);backdrop-filter:blur(12px);padding:1rem 3rem;box-shadow:0 4px 20px rgba(0,0,0,.3);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--primary);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links li a{color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;text-decoration:none;transition:.2s;}
.nav-links li a:hover, .nav-links li a.active{color:var(--primary);}
.nav-cta{display:inline-block;background:linear-gradient(135deg, #fff 0%, var(--primary) 100%);color:#000;padding:.7rem 1.8rem;border-radius:999px;font-size:.85rem;font-weight:800;text-decoration:none;letter-spacing:.05em;text-transform:uppercase;transition:.3s;box-shadow: 0 10px 20px rgba(0, 102, 255, 0.25);border: 1px solid rgba(255,255,255,0.15);}
.nav-cta:hover{transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 102, 255, 0.4); filter: brightness(1.1);}

/* HERO */
.work-hero { padding: 8rem 2rem 4rem; text-align: center; background: radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.05) 0%, transparent 70%); }
.hero-label { color: var(--primary); font-size: 0.8rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.5rem; }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -0.04em; }
.hero-desc { font-size: 1.1rem; color: var(--text-dim); line-height: 1.8; max-width: 600px; margin: 0 auto; }

/* FILTERS */
.filter-sect { padding: 2rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: #050505; position: sticky; top: 80px; z-index: 100; }
.filter-tabs { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
.filter-tab { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.6rem 1.5rem; border-radius: 999px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
.filter-tab:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.filter-tab.active { background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); border-color: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0, 102, 255, 0.3); }

/* GRID */
.work-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 4rem 2rem 8rem; }
.work-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 1.5rem; overflow: hidden; text-decoration: none; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.work-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.work-thumb-wrap { width: 100%; aspect-ratio: 4/3; background: #111; overflow: hidden; position: relative; }
.work-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
.work-card:hover .work-thumb-wrap img { transform: scale(1.1); }
.work-info { padding: 1.8rem; }
.work-cat { color: var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
.work-title { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem; }
.work-meta { font-size: 0.85rem; color: var(--text-dim); }

/* FOOTER */
footer { padding: 4rem 2rem; border-top: 1px solid var(--border); text-align: center; }
.footer-logo { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; text-decoration: none; display: inline-block; }
.footer-logo span { color: var(--primary); }
.footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; text-transform: uppercase; }

/* FADE UP */
.fu { opacity: 0; transform: translateY(30px); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
.fu.vis { opacity: 1; transform: translateY(0); }

@media(max-width: 992px) { .work-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width: 640px) { .work-grid { grid-template-columns: 1fr; } .nav-links{display:none;} }
</style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-logo">THE <span>3</span> STUDIO</a>
  <ul class="nav-links">
    <li><a href="index.html">홈</a></li>
    <li><a href="index.html#gallery" class="active">포트폴리오</a></li>
    <li><a href="index.html#team">전문가</a></li>
    <li><a href="services.html">서비스</a></li>
    <li><a href="contact.html">문의</a></li>
  </ul>
  <a href="contact.html" class="nav-cta">문의하기</a>
</nav>

<section class="work-hero">
    <div class="fu">
        <p class="hero-label">Selected Works</p>
        <h1 class="hero-title">압도적 성과로 증명하는<br>포트폴리오</h1>
        <p class="hero-desc">각 프로젝트는 단순한 작업물을 넘어, 브랜드의 성장을 견인하는 강력한 도구입니다.</p>
    </div>
</section>

<section class="filter-sect">
    <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-cat="all">All</button>
        <button class="filter-tab" data-cat="branding">Branding Design</button>
        <button class="filter-tab" data-cat="consulting">Business Consulting</button>
        <button class="filter-tab" data-cat="video">Video Production</button>
        <button class="filter-tab" data-cat="integrated">Integrated</button>
    </div>
</section>

<div class="work-grid" id="work-grid">
    <div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">데이터를 불러오는 중...</div>
</div>

<footer>
    <a href="index.html" class="footer-logo">THE <span>3</span> STUDIO</a>
    <p class="footer-copy">© 2026 THE 3 STUDIO. ALL RIGHTS RESERVED.</p>
</footer>

<script>
    window.addEventListener('scroll', () => {
        const navbar = document.getElementById('navbar');
        if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
    });

    const io = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); } }), {threshold:.1});

    let allItems = [];
    const categoryLabel = { branding: 'Branding Design', consulting: 'Business Consulting', video: 'Video Production', integrated: 'Integrated' };

    async function loadWork(cat = 'all') {
        const grid = document.getElementById('work-grid');
        try {
            if (!allItems.length) {
                const res = await fetch('/api/api.php?action=portfolio');
                allItems = await res.json();
            }
            const items = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
            if (!items.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">아직 등록된 작업물이 없습니다.</div>';
                return;
            }
            grid.innerHTML = items.map(item => {
                const thumb = item.thumbnail ? '/' + item.thumbnail : '/img/placeholder.jpg';
                const isVideo = /\.(mp4|webm|avi|mov)$/i.test(thumb);
                return `
                <a href="index.html?slug=${item.slug}#gallery" class="work-card fu">
                    <div class="work-thumb-wrap">
                        ${isVideo 
                            ? `<video src="${thumb}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>` 
                            : `<img src="${thumb}" alt="${item.title}">`}
                    </div>
                    <div class="work-info">
                        <div class="work-cat">${categoryLabel[item.category] || item.category}</div>
                        <h3 class="work-title">${item.title}</h3>
                        <div class="work-meta">${item.client ? item.client + ' · ' : ''}${item.year || ''}</div>
                    </div>
                </a>
            `}).join('');
            document.querySelectorAll('.work-card.fu').forEach(el => io.observe(el));
        } catch (e) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;color:rgba(255,255,255,.2)">데이터를 불러오지 못했습니다.</div>';
        }
    }

    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            loadWork(this.dataset.cat);
        });
    });

    // Initial Load
    loadWork();
    
    // Initial Fade-up
    document.querySelectorAll('.fu').forEach(el => io.observe(el));
</script>
</body>
</html>
