name: bizcut
description: A new Flutter project for BizCut - AI Image Solution for Small Business.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.7
  http: ^1.2.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
