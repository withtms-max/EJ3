<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE 3 STUDIO | Ultimate Master Control v5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #C8102E; 
            --sidebar-w: 280px;
            --danger: #ff3b30; 
            --success: #28cd41;
            --glow: 0 0 20px rgba(200, 16, 46, 0.4);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --------------------------------------------------------------------------
           [ISLAND 1] DARK THEME (The Luxury Black)
           -------------------------------------------------------------------------- */
        body:not(.light-mode) {
            --bg-main: #050505; 
            --bg-card: #0F0F0F; 
            --bg-sidebar: #050505;
            --text-main: #ffffff; 
            --text-dim: rgba(255,255,255,0.6);
            --border: rgba(255,255,255,0.08);
            --input-bg: #1A1A1A;
            --modal-overlay: rgba(0,0,0,0.85);
        }

        /* --------------------------------------------------------------------------
           [ISLAND 2] LIGHT THEME (The Clean Grey)
           -------------------------------------------------------------------------- */
        body.light-mode {
            --bg-main: #F4F6F8; 
            --bg-card: #ffffff; 
            --bg-sidebar: #ffffff;
            --text-main: #111111; 
            --text-dim: #6c757d;
            --border: rgba(0, 0, 0, 0.08); 
            --input-bg: #F8F9FA;
            --modal-overlay: rgba(255,255,255,0.85);
        }
        body.light-mode .nav-item:hover, body.light-mode .nav-item.active { background: rgba(0,0,0,0.05); color: #111; }
        body.light-mode .nav-item.active { background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(230, 57, 70, 0.15); }
        body.light-mode th { background: rgba(0,0,0,0.02); color: #495057; }
        body.light-mode .thumb-cell { background: #f8f9fa; }
        body.light-mode .btn-s { background: rgba(0,0,0,0.05); color: #111; }
        body.light-mode .nav-group-title { color: rgba(0,0,0,0.4); }

        /* --------------------------------------------------------------------------
           [SKELETON] COMMON UI STYLES
           -------------------------------------------------------------------------- */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg-main); color: var(--text-main); font-family: 'Pretendard Variable', 'Pretendard', 'Inter', sans-serif; transition: background var(--transition); letter-spacing: -0.01em; }
        .dashboard-layout { display: flex; height: 100vh; overflow: hidden; }

        .sidebar { 
            width: var(--sidebar-w); background: var(--bg-sidebar); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            padding: 2.5rem 1.2rem; flex-shrink: 0; z-index: 1000; transition: background var(--transition);
        }
        .logo { font-family: 'Outfit'; font-weight: 900; font-size: 1.5rem; color: var(--text-main); margin-bottom: 3rem; padding: 0 1rem; letter-spacing: -0.02em; }
        .logo span { color: var(--accent); }
        .nav-menu { flex: 1; overflow-y: auto; padding-right: 4px; }
        .nav-menu::-webkit-scrollbar { width: 3px; }
        .nav-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }

        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; color: var(--text-dim); border-radius: 16px; transition: var(--transition); margin-bottom: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 700; }
        .nav-item i { font-size: 1.1rem; opacity: 0.7; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); transform: translateX(5px); }
        .nav-item:hover i { color: var(--accent); opacity: 1; }
        .nav-item.active { background: linear-gradient(135deg, #B91C1C 0%, #E11D48 100%); color: #fff; box-shadow: 0 15px 30px rgba(185,28,28, 0.25); }
        .nav-item.active i { opacity: 1; color: #fff; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-main); transition: background var(--transition); }
        .top-bar { height: 75px; display: flex; align-items: center; justify-content: flex-end; padding: 0 2.5rem; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        .app-view { padding: 3.5rem; max-width: 1500px; margin: 0 auto; width: 100%; }

        .header-content { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .view-title h1 { font-family: 'Outfit'; font-size: 2.2rem; font-weight: 900; color: var(--text-main); letter-spacing: -0.03em; }
        .btn { background: linear-gradient(135deg, #B91C1C 0%, #E11D48 100%); color: #fff; border: none; padding: 14px 28px; border-radius: 14px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-size: 0.9rem; transition: var(--transition); box-shadow: 0 10px 20px rgba(185,28,28, 0.2); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(185,28,28, 0.35); filter: brightness(1.1); }
        .btn-s { background: rgba(255,255,255,0.06); padding: 10px 18px; border-radius: 10px; color: var(--text-dim); font-weight: 700; font-size: 0.8rem; }
        .btn-s:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-danger { color: #fff; background: #dc2626; box-shadow: 0 10px 20px rgba(220,38,38,0.2); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.2); }

        .table-container { background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; margin-top: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1.5rem; background: rgba(255,255,255,0.02); color: var(--text-dim); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 1.5rem; border-top: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; color: var(--text-main); font-weight: 500; }
        tr:hover td { background: rgba(255,255,255,0.01); }
        .thumb-cell { width: 64px; height: 48px; border-radius: 10px; overflow: hidden; background: #000; border: 1px solid var(--border); transition: 0.3s; }
        .thumb-cell:hover { transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .thumb-cell img, .thumb-cell video { width: 100%; height: 100%; object-fit: cover; }

        .modal { position: fixed; inset: 0; background: var(--modal-overlay); backdrop-filter: blur(25px); display: none; align-items: center; justify-content: center; z-index: 10000; transition: var(--transition); }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 35px; width: 95%; max-width: 780px; padding: 3.5rem; max-height: 90vh; overflow-y: auto; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 2rem; }
        .form-label { display: block; color: var(--text-dim); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.05em; }
        .form-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px; color: var(--text-main); font-size: 0.95rem; transition: var(--transition); font-weight: 500; }
        .form-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 20px rgba(200,16,46,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        textarea.form-input { min-height: 120px; line-height: 1.6; }

        .switch-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .switch-box { width: 42px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 20px; position: relative; transition: 0.3s; border: 1px solid var(--border); }
        .switch-box::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: #adb5bd; border-radius: 50%; transition: 0.3s; }
        input:checked + .switch-box { background: var(--accent); border-color: var(--accent); }
        input:checked + .switch-box::after { left: 21px; background: #fff; }

        .stat-card { background: var(--bg-card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-card label { display: block; font-size: 0.65rem; font-weight: 900; color: var(--text-dim); margin-bottom: 10px; }
        .stat-card input { width: 100%; background: transparent; border: none; font-size: 2rem; font-weight: 900; color: var(--text-main); margin-top: 5px; outline: none; }

        .upload-row { display: flex; gap: 20px; align-items: start; margin-bottom: 20px; }
        .upload-box { 
            flex: 1; min-height: 120px; background: rgba(255,255,255,0.03); 
            border: 2px dashed var(--border); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; position: relative; gap: 10px;
        }
        .upload-box:hover { border-color: var(--accent); background: rgba(230, 57, 70, 0.05); }
        .upload-box i { font-size: 2rem; color: var(--text-dim); }
        .upload-box span { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); }
        .preview-pane { 
            width: 120px; height: 120px; background: var(--input-bg); border-radius: 12px; 
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .preview-pane img, .preview-pane video { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--input-bg); }
        .gallery-item img, .gallery-item video { width: 100%; height: 100%; object-fit: cover; }
        .add-gallery-btn { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: var(--text-dim); background: var(--bg-card); }
        .add-gallery-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(230, 57, 70, 0.05); }
        .nav-group-title { margin:1.5rem 0 0.5rem 1.5rem; font-size:0.6rem; font-weight:900; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; opacity: 0.5; }
        .extra-menu { display:none; flex-direction:column; background: rgba(0,0,0,0.1); border-radius:10px; margin: 0 10px; padding: 5px 0; }
        .extra-menu.show { display:flex; }
        .nav-item.toggle-btn i.fa-chevron-down { font-size: 0.6rem; margin-left: auto; transition: 0.3s; }
        .nav-item.toggle-btn.active i.fa-chevron-down { transform: rotate(180deg); }

        .del-btn-mini { 
            position: absolute; top: 5px; right: 5px; width: 28px; height: 28px; 
            background: var(--danger); color: #fff; border: none; border-radius: 50%; 
            font-size: 16px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .del-btn-mini:hover { transform: scale(1.15); background: #ff5252; }
        .preview-pane { position: relative; }
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBTX7XZ3WRxvf1MnpotRvUQC8x9o6N44yc", authDomain: "the3-fc45a.firebaseapp.com",
        projectId: "the3-fc45a", storageBucket: "the3-fc45a.firebasestorage.app",
        messagingSenderId: "431210870560", appId: "1:431210870560:web:89283eeb92998db6358945"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // 실제 환경에 맞는 버킷 주소로 세팅 완료!
    const storage = getStorage(app, "gs://the3-fc45a.firebasestorage.app");
    const auth = getAuth(app);

    // --- Utilities ---
    window.isVideo = (path) => {
        if(!path) return false;
        const cleanPath = path.split('?')[0].split('#')[0];
        return /\.(mp4|webm|mov|avi)$/i.test(cleanPath);
    };

    window.isYouTube = (url) => {
        if(!url) return false;
        return /(?:https?:)?\/\/(?:www\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/.test(url);
    };

    window.getYouTubeId = (url) => {
        const m = url.match(/(?:https?:)?\/\/(?:www\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/);
        return m ? m[1] : null;
    };

    window.getYouTubeThumbnail = (url) => {
        const id = window.getYouTubeId(url);
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
    };

    window.updateItemOrder = async (col, id, newOrder) => {
        try {
            await updateDoc(doc(db, col, id), { sort_order: parseInt(newOrder) || 0 });
            console.log(`✅ [${col}] Order Updated: ${newOrder}`);
        } catch (err) {
            console.error(err);
            alert('순서 저장 중 오류가 발생했습니다.');
        }
    };

    window.generateSlug = (text) => {

        return text.toString().toLowerCase().trim()
            .replace(/\s+/g, '-')
            .replace(/[^\w가-힣\-]+/g, '')
            .replace(/\-\-+/g, '-')
            .replace(/^-+/, '')
            .replace(/-+$/, '');
    };

    window.handleTitleInput = (input) => {
        const slugField = document.getElementById('slug-field');
        if (slugField && !slugField.dataset.manual) {
            slugField.value = window.generateSlug(input.value);
        }
    };

    window.markSlugManual = () => {
        const slugField = document.getElementById('slug-field');
        if (slugField) slugField.dataset.manual = 'true';
    };

    
    // FETCH CATEGORIES FOR GLOBALS
    window.GLOBAL_CATS = [];
    getDoc(doc(db, 'settings', 'categories')).then(catSnap => {
        if(catSnap.exists() && catSnap.data().list) {
            window.GLOBAL_CATS = catSnap.data().list;
        } else {
            window.GLOBAL_CATS = [
                { id: 'calligraphy', label: '1> 캘리그라피 상호디자인' },
                { id: 'video', label: '2> 돈되는 영상만들기' },
                { id: 'storyboard', label: '3> 우리매장 스토리보드' },
                { id: 'photo', label: '4> 내 가게 사진촬영' },
                { id: 'character', label: '5> 가게 캐릭터만들기' }
            ];
        }
    });

    const appView = document.getElementById('app-view');

    const modal = document.getElementById('modal');
    const itemForm = document.getElementById('item-form');
    let currentPortfolioFilter = 'all'; // 포트폴리오 필터 상태 유지용
    // uploader는 전역 변수로 관리됨

    onAuthStateChanged(auth, (user) => {
        if (!user) {

    // ───── UPLOAD HELPER ─────
    window.clearUpload = (name) => {
        const pathInput = document.getElementById('path-' + name);
        if(pathInput) pathInput.value = '';
        const prev = document.getElementById('uprev-' + name);
        if(prev) prev.innerHTML = '<i class="fa fa-image" style="opacity:0.1"></i><div id="udel-' + name + '"></div>';
    };

    window.triggerUpload = (targetField, targetType, callback = null, multiple = false) => {
        uploader.value = "";
        uploader.multiple = multiple;
        uploader.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            // Limit to 30 files
            const uploadCount = Math.min(files.length, 30);
            
            for(let i=0; i<uploadCount; i++) {
                const file = files[i];
                const box = document.getElementById('ubox-' + targetField);
                const prog = document.getElementById('uprog-' + targetField);
                const preview = document.getElementById('uprev-' + targetField);
                const pathInput = document.getElementById('path-' + targetField);
                const boxLabel = box?.querySelector('span');

                if(box) box.style.opacity = '0.7';
                if(boxLabel) boxLabel.innerText = uploadCount > 1 ? `업로드 중 (${i+1}/${uploadCount})` : '전송 준비 중...';
                if(prog) {
                    prog.style.transition = 'width 0.1s linear';
                    prog.style.width = '2%';
                }

                try {
                    const ext = file.name.split('.').pop();
                    const filename = `${targetType}_${Date.now()}_${i}.${ext}`;
                    const storageRef = ref(storage, `uploads/${targetType}/${filename}`);
                    const uploadTask = uploadBytesResumable(storageRef, file);

                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', 
                            (snapshot) => {
                                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                if(prog) prog.style.width = progress + '%';
                                if(boxLabel && uploadCount === 1) boxLabel.innerText = `전송 중... (${Math.round(progress)}%)`;
                            }, 
                            (error) => { reject(error); }, 
                            async () => {
                                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                                if(callback) {
                                    callback(downloadURL);
                                } else {
                                    if(pathInput) pathInput.value = downloadURL;
                                    if(preview) {
                                        preview.innerHTML = isVideo(downloadURL) 
                                            ? `<video src="${downloadURL}" autoplay muted loop playsinline webkit-playsinline style="max-height:100%"></video>`
                                            : `<img src="${downloadURL}" style="max-height:100%">`;
                                        // 딜리트 버튼 노출
                                        const delWrap = document.getElementById('udel-' + targetField);
                                        if(delWrap) delWrap.innerHTML = `<button type="button" class="del-btn-mini" onclick="window.clearUpload('${targetField}')">&times;</button>`;
                                    }
                                }
                                resolve();
                            }
                        );
                    });
                } catch (err) {
                    console.error("💣 업로드 중단됨:", err);
                    if(uploadCount === 1) alert('업로드 실패: ' + err.message);
                }
            }

            // Cleanup UI
            const finalBox = document.getElementById('ubox-' + targetField);
            const finalLabel = finalBox?.querySelector('span');
            const finalProg = document.getElementById('uprog-' + targetField);
            
            if(finalLabel) finalLabel.innerText = '전송 완료! ✨';
            if(finalProg) finalProg.style.width = '100%';

            setTimeout(() => {
                if(finalBox) {
                    finalBox.style.opacity = '1';
                    finalBox.style.borderColor = 'rgba(255,255,255,0.08)';
                }
                if(finalLabel) finalLabel.innerText = '미디어 변경하기';
                if(finalProg) finalProg.style.width = '0%';
            }, 1000);
        };
        uploader.click();
    };

    window.initGalleryDropZone = (target) => {
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            target.addEventListener(eventName, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
        });
        target.addEventListener('dragover', () => target.classList.add('drag-over'));
        target.addEventListener('dragleave', () => target.classList.remove('drag-over'));
        target.addEventListener('drop', async (e) => {
            target.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
            if(files.length === 0) return;
            
            const uploadCount = Math.min(files.length, 30 - target.children.length);
            if(uploadCount <= 0) return alert('이미 30장의 이미지가 가득 찼습니다!');

            for(let i=0; i<uploadCount; i++) {
                const file = files[i];
                try {
                    const ext = file.name.split('.').pop();
                    const filename = `gallery_${Date.now()}_${i}.${ext}`;
                    const storageRef = ref(storage, `uploads/portfolio/${filename}`);
                    const uploadTask = uploadBytesResumable(storageRef, file);
                    const url = await new Promise((res, rej) => {
                        uploadTask.on('state_changed', null, rej, async () => {
                            res(await getDownloadURL(uploadTask.snapshot.ref));
                        });
                    });
                    const div = document.createElement('div');
                    div.innerHTML = window.renderGalleryItem(url);
                    target.appendChild(div.firstElementChild);

            }
        });
    };

    function renderUploadUI(name, type, value) {
        const previewHTML = value ? (isVideo(value) ? `<video src="${getMediaSrc(value)}" autoplay muted loop playsinline webkit-playsinline></video>` : `<img src="${getMediaSrc(value)}">`) : '<i class="fa fa-image" style="opacity:0.1"></i>';
        const delBtn = value ? `<button type="button" class="del-btn-mini" onclick="window.clearUpload('${name}')">&times;</button>` : '';
        return `
            <div class="upload-row">
                <div class="preview-pane" id="uprev-${name}">
                    ${previewHTML}
                    <div id="udel-${name}">${delBtn}</div>
                </div>
                <div class="upload-box" id="ubox-${name}" onclick="triggerUpload('${name}', '${type}')">
                    <i class="fa fa-cloud-upload"></i>
                    <span>클릭하여 미디어 업로드</span>
                    <div class="upload-progress" id="uprog-${name}"></div>
                </div>
            </div>
            <input type="hidden" name="${name}" id="path-${name}" value="${value||''}">
        `;
    }

                             <span style="background:linear-gradient(135deg,#fff 0%,#E63946 50%,#8b0000 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 30px rgba(230,57,70,0.5));">

                             style="position:absolute; top:65%; left:50%; transform:translate(-50%, ${d['off_desc'+suffix]||0}px); color:rgba(255,255,255,0.9); font-size:${d['off_desc_fs'+suffix]||1.15}rem; width:80%; max-width:850px; padding:15px; cursor:move; line-height:1.8; word-break:keep-all; font-weight:600; text-shadow:0 2px 8px rgba(0,0,0,0.8); user-select:none; text-align:center; border:1px dashed rgba(255,255,255,0.1);">

                </div>
            `;

            const draggables = container.querySelectorAll('.draggable');
            draggables.forEach(el => {
                let sy, sv, startFS, resizing = false;
                
                el.onmousedown = (e) => {
                    const handle = e.target.closest('.resize-handle');
                    if (handle) {
                        resizing = true;
                        e.preventDefault();
                        e.stopPropagation();
                        sy = e.clientY;
                        startFS = parseFloat(window.getComputedStyle(el).fontSize);
                        
                        const rMove = (me) => {
                            const delta = me.clientY - sy;
                            el.style.fontSize = `${startFS + delta * 0.1}px`;
                        };
                        const rUp = () => {
                            window.removeEventListener('mousemove', rMove);
                            window.removeEventListener('mouseup', rUp);
                        };
                        window.addEventListener('mousemove', rMove);
                        window.addEventListener('mouseup', rUp);
                        return;
                    }

                    e.preventDefault();
                    e.stopPropagation();
                    
                    sy = e.clientY;
                    const matches = el.style.transform.match(/translate\(-50%,\s*(-?\d+\.?\d*)px\)/);
                    sv = matches ? parseFloat(matches[1]) : 0;
                    
                    const move = (me) => { 
                        el.style.transform = `translate(-50%, ${sv + me.clientY - sy}px)`; 
                    };
                    const up = () => {
                        window.removeEventListener('mousemove', move);
                        window.removeEventListener('mouseup', up);
                    };
                    window.addEventListener('mousemove', move);
                    window.addEventListener('mouseup', up);
                };
            });
        };

        renderEditor('pc');
        window.openLiveLayoutEditorMode = (mode) => renderEditor(mode);
    };

    window.saveLiveLayout = async () => {
        const container = document.getElementById('live-preview-container');
        const draggables = container.querySelectorAll('.draggable');
        const updates = {};
        
        draggables.forEach(el => {
            const key = el.dataset.key;
            const matches = el.style.transform.match(/translate\(-50%,\s*(-?\d+\.?\d*)px\)/);
            updates[key] = matches ? parseFloat(matches[1]) : 0;
            
            // SAVE CUSTOM FONT SIZE
            const fs = window.getComputedStyle(el).fontSize;
            updates[key + '_fs'] = parseFloat(fs) / 16; // Save as rem
        });

        try {
            await updateDoc(doc(db, 'settings', 'hero'), updates);
            alert(`${currentMode.toUpperCase()} 배치가 성공적으로 저장되었습니다!`);

        } catch(e) {
            alert('저장 중 오류 발생: ' + e.message);
        }
    };
