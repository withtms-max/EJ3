<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE 3 STUDIO | Ultimate Master Control v5.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000; --bg-card: #0a0a0a; --accent: #E63946; /* 브랜드 컬러 일치 (#E63946) */
            --text-main: #ffffff; --text-dim: rgba(255,255,255,0.5);
            --border: rgba(255,255,255,0.08); --sidebar-w: 260px;
            --danger: #ff3b30; --success: #28cd41;
            --glow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; }
        .dashboard-layout { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2rem 1rem; flex-shrink: 0; z-index: 1000; }
        .logo { font-family: 'Outfit'; font-weight: 900; font-size: 1.4rem; color: #fff; margin-bottom: 2.5rem; padding: 0 1rem; }
        .logo span { color: var(--accent); }
        .nav-menu { flex: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-dim); border-radius: 12px; transition: 0.3s; margin-bottom: 5px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: var(--accent); box-shadow: 0 10px 20px rgba(230,57,70, 0.2); }

        /* Content Area */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #050505; }
        .top-bar { height: 70px; display: flex; align-items: center; justify-content: flex-end; padding: 0 2rem; border-bottom: 1px solid var(--border); }
        .app-view { padding: 2.5rem; max-width: 1400px; margin: 0 auto; width: 100%; }

        /* UI Elements */
        .header-content { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .view-title h1 { font-family: 'Outfit'; font-size: 2rem; font-weight: 900; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.8rem; transition: 0.3s; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-s { background: rgba(255,255,255,0.08); padding: 8px 16px; border-radius: 8px; }
        .btn-danger { color: var(--danger); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }

        .table-container { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-top: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1.2rem; background: rgba(255,255,255,0.02); color: var(--text-dim); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        td { padding: 1.2rem; border-top: 1px solid var(--border); font-size: 0.85rem; vertical-align: middle; }
        .thumb-cell { width: 60px; height: 45px; border-radius: 8px; overflow: hidden; background: #111; border: 1px solid var(--border); }
        .thumb-cell img, .thumb-cell video { width: 100%; height: 100%; object-fit: cover; }

        /* Forms & Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 750px; padding: 3rem; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; color: var(--text-dim); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .form-input { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; font-size: 0.9rem; }
        .form-input:focus { border-color: var(--accent); outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        textarea.form-input { min-height: 80px; }

        /* Toggle Switch */
        .switch-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .switch-box { width: 40px; height: 22px; background: #222; border-radius: 20px; position: relative; transition: 0.3s; }
        .switch-box::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: #666; border-radius: 50%; transition: 0.3s; }
        input:checked + .switch-box { background: var(--accent); }
        input:checked + .switch-box::after { left: 21px; background: #fff; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: var(--bg-card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-card label { display: block; font-size: 0.65rem; font-weight: 900; color: var(--text-dim); margin-bottom: 10px; }
        .stat-card input { width: 100%; background: transparent; border: none; font-size: 2rem; font-weight: 900; color: #fff; margin-top: 5px; }
        /* Upload & Preview System */
        .upload-row { display: flex; gap: 20px; align-items: start; margin-bottom: 20px; }
        .upload-box { 
            flex: 1; min-height: 120px; background: rgba(255,255,255,0.03); 
            border: 2px dashed var(--border); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; position: relative; gap: 10px;
        }
        .upload-box:hover { border-color: var(--accent); background: rgba(230,57,70,0.05); }
        .upload-box i { font-size: 2rem; color: var(--text-dim); }
        .upload-box span { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); }
        .preview-pane { 
            width: 120px; height: 120px; background: #111; border-radius: 12px; 
            border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .preview-pane img, .preview-pane video { width: 100%; height: 100%; object-fit: cover; }
        .upload-progress { 
            position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); 
            width: 0%; border-radius: 0 0 15px 15px; transition: 0.3s;
        }

        /* Portfolio Gallery UI */
        .gallery-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #111; }
        .gallery-item img, .gallery-item video { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item .del-btn, .del-btn-mini { position: absolute; top: 5px; right: 5px; background: rgba(255,59,48,0.9); color: #fff; width: 24px; height: 24px; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.2s; }
        .gallery-item .del-btn:hover, .del-btn-mini:hover { transform: scale(1.1); background: #ff3b30; }
        .add-gallery-btn { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: var(--text-dim); }
        .add-gallery-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(230,57,70,0.05); }
        .add-gallery-btn i { font-size: 1.5rem; margin-bottom: 5px; }
        .add-gallery-btn span { font-size: 0.7rem; font-weight: 700; }

        /* Drag & Drop Highlight */
        .gallery-list.drag-over { border-color: var(--accent) !important; background: rgba(230,57,70,0.1) !important; border-style: solid !important; }
        .nav-group-title { margin:1.5rem 0 0.5rem 1.5rem; font-size:0.6rem; font-weight:900; color:rgba(255,255,255,0.2); letter-spacing:0.1em; text-transform:uppercase; }
        .extra-menu { display:none; flex-direction:column; background: rgba(0,0,0,0.2); border-radius:10px; margin: 0 10px; padding: 5px 0; }
        .extra-menu.show { display:flex; }
        .nav-item.toggle-btn i.fa-chevron-down { font-size: 0.6rem; margin-left: auto; transition: 0.3s; }
        .nav-item.toggle-btn.active i.fa-chevron-down { transform: rotate(180deg); }
    </style>
</head>

<script>
    // 전역 변수로 uploader 정의 (모듈 내에서 접근 가능하도록)
    var uploader;
    document.addEventListener('DOMContentLoaded', () => {

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBTX7XZ3WRxvf1MnpotRvUQC8x9o6N44yc", authDomain: "the3-fc45a.firebaseapp.com",
        projectId: "the3-fc45a", storageBucket: "the3-fc45a.firebasestorage.app",
        messagingSenderId: "431210870560", appId: "1:431210870560:web:89283eeb92998db6358945"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // 실제 환경에 맞는 버킷 주소로 세팅 완료!
    const storage = getStorage(app, "gs://the3-fc45a.firebasestorage.app");
    const auth = getAuth(app);

    // --- Utilities ---
    window.isVideo = (path) => {
        if(!path) return false;
        const cleanPath = path.split('?')[0].split('#')[0];
        return /\.(mp4|webm|mov|avi)$/i.test(cleanPath);
    };

    window.isYouTube = (url) => {
        if(!url) return false;
        return /(?:https?:)?\/\/(?:www\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/.test(url);
    };

    window.getYouTubeId = (url) => {
        const m = url.match(/(?:https?:)?\/\/(?:www\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/);
        return m ? m[1] : null;
    };

    window.getYouTubeThumbnail = (url) => {
        const id = window.getYouTubeId(url);
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
    };

    window.generateSlug = (text) => {
        return text.toString().toLowerCase().trim()
            .replace(/\s+/g, '-')
            .replace(/[^\w가-힣\-]+/g, '')
            .replace(/\-\-+/g, '-')
            .replace(/^-+/, '')
            .replace(/-+$/, '');
    };

    window.handleTitleInput = (input) => {
        const slugField = document.getElementById('slug-field');
        if (slugField && !slugField.dataset.manual) {
            slugField.value = window.generateSlug(input.value);
        }
    };

    window.markSlugManual = () => {
        const slugField = document.getElementById('slug-field');
        if (slugField) slugField.dataset.manual = 'true';
    };

    const appView = document.getElementById('app-view');
    const modal = document.getElementById('modal');
    const itemForm = document.getElementById('item-form');
    let currentPortfolioFilter = 'all'; // 포트폴리오 필터 상태 유지용
    // uploader는 전역 변수로 관리됨

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            if (window.location.pathname !== '/admin/login.html') location.assign('/admin/login.html');
            return;
        }
        // 로그인이 확인되면 기본 대시보드로 이동
        if (!appView.innerHTML || appView.innerHTML.includes('spinner')) {
            switchView('dashboard');
        }
    });

    window.logout = async () => {
        if(confirm('정말 로그아웃 하시겠습니까?')) {
            await signOut(auth);
            location.assign('/admin/login.html');
        }
    };

    window.toggleExtraMenu = (btn) => {
        btn.classList.toggle('active');
        document.getElementById('extra-menu').classList.toggle('show');
    };
    const getMediaSrc = (path) => (path && path.startsWith('http')) ? path : (path ? '../' + path : '');

    // ───── UPLOAD HELPER ─────
    window.clearUpload = (name) => {
        const pathInput = document.getElementById('path-' + name);
        if(pathInput) pathInput.value = '';
        const prev = document.getElementById('uprev-' + name);
        if(prev) prev.innerHTML = '<i class="fa fa-image" style="opacity:0.1"></i><div id="udel-' + name + '"></div>';
    };

    window.triggerUpload = (targetField, targetType, callback = null, multiple = false) => {
        uploader.value = "";
        uploader.multiple = multiple;
        uploader.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            // Limit to 30 files
            const uploadCount = Math.min(files.length, 30);
            
            for(let i=0; i<uploadCount; i++) {
                const file = files[i];
                const box = document.getElementById('ubox-' + targetField);
                const prog = document.getElementById('uprog-' + targetField);
                const preview = document.getElementById('uprev-' + targetField);
                const pathInput = document.getElementById('path-' + targetField);
                const boxLabel = box?.querySelector('span');

                if(box) box.style.opacity = '0.7';
                if(boxLabel) boxLabel.innerText = uploadCount > 1 ? `업로드 중 (${i+1}/${uploadCount})` : '전송 준비 중...';
                if(prog) {
                    prog.style.transition = 'width 0.1s linear';
                    prog.style.width = '2%';
                }

                try {
                    const ext = file.name.split('.').pop();
                    const filename = `${targetType}_${Date.now()}_${i}.${ext}`;
                    const storageRef = ref(storage, `uploads/${targetType}/${filename}`);
                    const uploadTask = uploadBytesResumable(storageRef, file);

                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', 
                            (snapshot) => {
                                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                if(prog) prog.style.width = progress + '%';
                                if(boxLabel && uploadCount === 1) boxLabel.innerText = `전송 중... (${Math.round(progress)}%)`;
                            }, 
                            (error) => { reject(error); }, 
                            async () => {
                                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                                if(callback) {
                                    callback(downloadURL);
                                } else {
                                    if(pathInput) pathInput.value = downloadURL;
                                    if(preview) {
                                        preview.innerHTML = isVideo(downloadURL) 
                                            ? `<video src="${downloadURL}" autoplay muted loop style="max-height:100%"></video>`
                                            : `<img src="${downloadURL}" style="max-height:100%">`;
                                        // 딜리트 버튼 노출
                                        const delWrap = document.getElementById('udel-' + targetField);
                                        if(delWrap) delWrap.innerHTML = `<button type="button" class="del-btn-mini" onclick="window.clearUpload('${targetField}')">&times;</button>`;
                                    }
                                }
                                resolve();
                            }
                        );
                    });
                } catch (err) {
                    console.error("💣 업로드 중단됨:", err);
                    if(uploadCount === 1) alert('업로드 실패: ' + err.message);
                }
            }

            // Cleanup UI
            const finalBox = document.getElementById('ubox-' + targetField);
            const finalLabel = finalBox?.querySelector('span');
            const finalProg = document.getElementById('uprog-' + targetField);
            
            if(finalLabel) finalLabel.innerText = '전송 완료! ✨';
            if(finalProg) finalProg.style.width = '100%';

            setTimeout(() => {
                if(finalBox) {
                    finalBox.style.opacity = '1';
                    finalBox.style.borderColor = 'rgba(255,255,255,0.08)';
                }
                if(finalLabel) finalLabel.innerText = '미디어 변경하기';
                if(finalProg) finalProg.style.width = '0%';
            }, 1000);
        };
        uploader.click();
    };

    // Gallery Multi-Image Helpers
    window.renderGalleryItem = (url) => {
        const isVid = window.isVideo(url);
        const isYT = window.isYouTube(url);
        const ytThumb = isYT ? window.getYouTubeThumbnail(url) : null;
        let mediaHTML;
        if(isYT) {
            mediaHTML = `<img src="${ytThumb}" style="width:100%;height:100%;object-fit:cover;"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);"><i class="fa fa-brands fa-youtube" style="color:#ff0000;font-size:1.8rem;"></i></div>`;
        } else if(isVid) {
            mediaHTML = `<video src="${url}" muted loop autoplay></video>`;
        } else {
            mediaHTML = `<img src="${url}">`;
        }
        return `
            <div class="gallery-item" style="position:relative;">
                <button type="button" class="del-btn" onclick="this.parentElement.remove()">&times;</button>
                ${mediaHTML}
                <input type="hidden" name="images" value="${url}">
            </div>
        `;
    };

    // URL로 갤러리에 추가 (유튜브 포함)
    window.addGalleryUrl = () => {
        const url = prompt('추가할 URL을 입력하세요:\n(유튜브, 이미지 URL 모두 가능)');
        if(!url || !url.trim()) return;
        const trimmed = url.trim();
        const list = document.getElementById('gallery-list');
        const div = document.createElement('div');
        div.innerHTML = window.renderGalleryItem(trimmed);
        list.appendChild(div.firstElementChild);
    };

    window.triggerGalleryUpload = () => {
        window.triggerUpload('gallery-dummy', 'portfolio', (url) => {
            const list = document.getElementById('gallery-list');
            const div = document.createElement('div');
            div.innerHTML = window.renderGalleryItem(url);
            list.appendChild(div.firstElementChild);
            if(list.children.length > 30) {
                alert('최대 30장까지만 업로드 가능합니다!');
                list.lastElementChild.remove();
            }
        }, true);
    };

    window.initGalleryDropZone = (target) => {
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            target.addEventListener(eventName, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
        });
        target.addEventListener('dragover', () => target.classList.add('drag-over'));
        target.addEventListener('dragleave', () => target.classList.remove('drag-over'));
        target.addEventListener('drop', async (e) => {
            target.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
            if(files.length === 0) return;
            
            const uploadCount = Math.min(files.length, 30 - target.children.length);
            if(uploadCount <= 0) return alert('이미 30장의 이미지가 가득 찼습니다!');

            for(let i=0; i<uploadCount; i++) {
                const file = files[i];
                try {
                    const ext = file.name.split('.').pop();
                    const filename = `gallery_${Date.now()}_${i}.${ext}`;
                    const storageRef = ref(storage, `uploads/portfolio/${filename}`);
                    const uploadTask = uploadBytesResumable(storageRef, file);
                    const url = await new Promise((res, rej) => {
                        uploadTask.on('state_changed', null, rej, async () => {
                            res(await getDownloadURL(uploadTask.snapshot.ref));
                        });
                    });
                    const div = document.createElement('div');
                    div.innerHTML = window.renderGalleryItem(url);
                    target.appendChild(div.firstElementChild);
                } catch(err) { console.error(err); }
            }
        });
    };

                    <p style="font-size:0.65rem; color:var(--text-dim); margin-bottom:10px;">상세 페이지 슬라이드쇼에 표시됩니다. <b>파일 업로드</b> 또는 <b>유튜브/이미지 URL</b>로 추가 가능합니다. (최대 30개)</p>
                    <div class="gallery-list" id="gallery-list" style="min-height:120px; border:1px dashed rgba(255,255,255,0.1); border-radius:12px; padding:15px; position:relative;">
                        ${(data?.images && Array.isArray(data.images)) ? data.images.map(img => window.renderGalleryItem(typeof img === 'string' ? img : (img.url || img.image_path))).join('') : ''}
                    </div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button type="button" class="btn btn-outline" style="flex:1; border-style:dashed;" onclick="window.triggerGalleryUpload()">
                            <i class="fa fa-cloud-upload"></i> 파일 업로드
                        </button>
                        <button type="button" class="btn btn-outline" style="flex:1; border-style:dashed; border-color:rgba(255,0,0,0.4); color:#ff6b6b;" onclick="window.addGalleryUrl()">
                            <i class="fa fa-brands fa-youtube"></i> YouTube/URL 추가
                        </button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">제목 *</label>
                        <input name="title" class="form-input" value="${data?.title||''}" placeholder="예: THE3 브랜드 아이덴티티" required oninput="handleTitleInput(this)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">슬러그 (URL 주소)</label>
                        <input name="slug" id="slug-field" class="form-input" value="${data?.slug||''}" placeholder="자동 생성됩니다" oninput="markSlugManual()" ${data?.slug?'data-manual="true"':''}>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">카테고리</label>
                        <select name="category" class="form-input">
                            <option value="branding" ${data?.category==='branding'?'selected':''}>Branding Design</option>
                            <option value="consulting" ${data?.category==='consulting'?'selected':''}>Business Consulting</option>
                            <option value="video" ${data?.category==='video'?'selected':''}>Video Production</option>
                            <option value="integrated" ${data?.category==='integrated'?'selected':''}>Integrated Solution</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">클라이언트</label>
                        <input name="client" class="form-input" value="${data?.client||''}" placeholder="예: 삼성전자">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">제작 연도</label>
                        <input name="year" class="form-input" value="${data?.year||'2026'}" placeholder="예: 2026">
                    </div>
                    <div class="form-group">
                        <label class="form-label">노출 순서</label>
                        <input name="sort_order" class="form-input" type="number" value="${data?.sort_order||0}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">3D 카드 사이즈</label>
                        <select name="card_size" class="form-input">
                            <option value="normal" ${data?.card_size==='normal'?'selected':''}>Normal (정사각형)</option>
                            <option value="tall" ${data?.card_size==='tall'?'selected':''}>Tall (세로형)</option>
                            <option value="wide" ${data?.card_size==='wide'?'selected':''}>Wide (가로형)</option>
                            <option value="large" ${data?.card_size==='large'?'selected':''}>Large (크게 강조)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">상태 (Status)</label>
                        <select name="status" class="form-input">
                            <option value="Published" ${data?.status==='Published'?'selected':''}>공개 (Published)</option>
                            <option value="Draft" ${data?.status==='Draft'?'selected':''}>비공개 (Draft)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group"><label class="form-label">태그 (Tags, 콤마 구분)</label><input name="tags" class="form-input" value="${data?.tags||''}" placeholder="BI, 로고, 패키지"></div>
                <div class="form-group"><label class="form-label">Challenge</label><textarea name="challenge" class="form-input">${data?.challenge||''}</textarea></div>
                <div class="form-group"><label class="form-label">Solution</label><textarea name="solution" class="form-input">${data?.solution||''}</textarea></div>
                <div class="form-group"><label class="form-label">Result</label><textarea name="result" class="form-input">${data?.result||''}</textarea></div>
                
                <div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px;">
                    <label class="switch-wrap"><input type="checkbox" name="show_in_gallery" value="1" hidden ${(data?.show_in_gallery!=='0')?'checked':''}> <div class="switch-box"></div> <span style="font-size:0.75rem; font-weight:700;">3D 갤러리(PC)</span></label>
                    <label class="switch-wrap"><input type="checkbox" name="show_in_gallery_mobile" value="1" hidden ${(data?.show_in_gallery_mobile!=='0')?'checked':''}> <div class="switch-box"></div> <span style="font-size:0.75rem; font-weight:700; color:var(--accent);">3D 갤러리(모바일)</span></label>
                    <label class="switch-wrap"><input type="checkbox" name="show_in_list" value="1" hidden ${(data?.show_in_list!=='0')?'checked':''}> <div class="switch-box"></div> <span style="font-size:0.75rem; font-weight:700;">상세 리스트 노출</span></label>
                    <label class="switch-wrap"><input type="checkbox" name="disable_detail_click" value="1" hidden ${(data?.disable_detail_click==='1' || data?.disable_detail_click === 1)?'checked':''}> <div class="switch-box"></div> <span style="font-size:0.75rem; font-weight:700; color:#ff6b6b;">3D 클릭 비활성</span></label>
                </div>
            `;
        } else if(col === 'stats') {
            html = `<div class="form-group"><label class="form-label">수치 제목</label><input name="label" class="form-input" value="${data?.label||''}"></div><div class="form-group"><label class="form-label">수치 (숫자/텍스트)</label><input name="value" class="form-input" value="${data?.value||''}"></div><div class="form-group"><label class="form-label">정렬 순서</label><input name="sort_order" class="form-input" value="${data?.sort_order||0}"></div>`;
        } else if(col === 'hero_slides') {
            html = `
                <div class="form-group">
                    <label class="form-label">히어로 이미지/영상</label>
                    ${renderUploadUI('image_path', 'hero', data?.image_path)}
                </div>
                <div class="form-group"><label class="form-label">정렬 순서</label><input name="sort_order" class="form-input" value="${data?.sort_order||0}"></div>
            `;
        } else if(col === 'team') {
            html = `
                <div class="form-group"><label class="form-label">이름</label><input name="name" class="form-input" value="${data?.name||''}"></div>
                <div class="form-group"><label class="form-label">역할/직책 (예: 기획 전문가, 브랜딩 디렉터)</label><input name="role" class="form-input" value="${data?.role||''}"></div>
                <div class="form-group"><label class="form-label">전문 분야 설명 (Bio)</label><textarea name="bio" class="form-input" style="min-height:80px;" placeholder="어떤 업무를 전문적으로 수행하는지 설명해주세요.">${data?.bio||''}</textarea></div>
                <div class="form-group">
                    <label class="form-label">상세 업무 리스트 (Tasks)</label>
                    <p style="font-size:0.6rem; color:var(--text-dim); margin-bottom:8px;">각 항목을 <b>줄바꿈(Enter)</b>으로 구분하여 입력해주세요. 웹사이트에 불렛 포인트로 표시됩니다.</p>
                    <textarea name="tasks" class="form-input" style="min-height:100px;" placeholder="전략적 비즈니스 컨설팅&#10;시장 분석 및 경쟁력 평가&#10;운영 프로세스 최적화">${data?.tasks||''}</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">프로필 사진</label>
                    ${renderUploadUI('photo', 'team', data?.photo)}
                </div>
            `;
        } else if(col === 'journey') {
             html = `
                <div class="form-group"><label class="form-label">기간</label><input name="period" class="form-input" value="${data?.period||''}" placeholder="예: 1998 - 현재"></div>
                <div class="form-group"><label class="form-label">타이틀 (상단 라벨)</label><input name="title" class="form-input" value="${data?.title||''}" placeholder="예: 기획 & 전략"></div>
                <div class="form-group"><label class="form-label">요약 (메인 제목)</label><input name="subtitle" class="form-input" value="${data?.subtitle||''}" placeholder="예: 대형 광고대행사 출신 기획"></div>
                <div class="form-group"><label class="form-label">상세 설명 (하단 본문)</label><textarea name="description" class="form-input" style="min-height:120px;" placeholder="상세 내용을 입력하세요...">${data?.description||''}</textarea></div>
             `;
        } else if(col === 'clients') {
             html = `
                <div class="form-group"><label class="form-label">기업명</label><input name="name" class="form-input" value="${data?.name||''}"></div>
                <div class="form-group">
                    <label class="form-label">로고 이미지</label>
                    ${renderUploadUI('logo', 'clients', data?.logo)}
                </div>
             `;
        } else if(col === 'contacts') {
             html = `
                <div class="form-group"><label class="form-label">성함/회사명</label><input class="form-input" value="${data?.company_name||''}" readonly></div>
                <div class="form-group"><label class="form-label">이메일</label><input class="form-input" value="${data?.email||''}" readonly></div>
                <div class="form-group"><label class="form-label">관심 서비스</label><input class="form-input" value="${data?.service||''}" readonly></div>
                <div class="form-group"><label class="form-label">문의 내용</label><textarea class="form-input" style="min-height:150px;" readonly>${data?.message||''}</textarea></div>
                 <div class="form-group"><label class="form-label">문의 날짜</label><input class="form-input" value="${data?.created_at||''}" readonly></div>
             `;
        } else if(col === 'impact_stories') {
            html = `
                <div class="form-group"><label class="form-label">인용구 (Quote)</label><textarea name="quote" class="form-input" style="min-height:100px;" placeholder="예: 'THE 3 덕분에 매출이 3배 올랐어요!'" required>${data?.quote||''}</textarea></div>
                <div class="form-group"><label class="form-label">작성자 (이름 및 직함)</label><input name="author" class="form-input" value="${data?.author||''}" placeholder="예: 일품각 장양꼬 사장님" required></div>
                <div class="form-group"><label class="form-label">성과 뱃지 (Badge)</label><input name="result" class="form-input" value="${data?.result||''}" placeholder="예: 방문자 리뷰 1,000개 돌파" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="form-group">
                        <label class="form-label">프로필 사진 (Avatar)</label>
                        ${renderUploadUI('avatar', 'impact', data?.avatar)}
                    </div>
                    <div class="form-group">
                        <label class="form-label">카드 배경 이미지 (Background)</label>
                        ${renderUploadUI('bg_image', 'impact', data?.bg_image)}
                    </div>
                </div>
                <div class="form-group"><label class="form-label">정렬 순서</label><input name="sort_order" class="form-input" type="number" value="${data?.sort_order||0}"></div>
            `;
        }
        document.getElementById('modal-content').innerHTML = html;
        
        // Initialize Drop Zone if portfolio
        if (col === 'portfolio') {
            const galleryList = document.getElementById('gallery-list');
            if (galleryList) window.initGalleryDropZone(galleryList);
        }

        const cSz = document.querySelector('[name=card_size]'); if(cSz && data?.card_size) cSz.value = data.card_size;
        const sSt = document.querySelector('[name=status]'); if(sSt && data?.status) sSt.value = data.status;
        modal.style.display = 'flex';
    };

    window.editItem = async (col, id) => { const s = await getDoc(doc(db, col, id)); openEditModal(col, {...s.data(), id: s.id}); };
    window.deleteItem = async (col, id) => { 
        if(confirm('영구 삭제하시겠습니까?')) { 
            await deleteDoc(doc(db, col, id)); 
            if(col === 'portfolio') renderPortfolio(currentPortfolioFilter);
            else switchView(col); 
        } 
    };
    window.closeModal = () => modal.style.display='none';
    itemForm.onsubmit = async (e) => {
        e.preventDefault(); 
        const col = document.getElementById('item-col').value; 
        const id = document.getElementById('item-id').value;
        const fd = new FormData(itemForm); 
        const o = Object.fromEntries(fd.entries()); 

        if (col === 'portfolio') {
            const galleryImages = fd.getAll('images').filter(u => u && u.trim() !== '');
            o.images = galleryImages;
            o.show_in_gallery = fd.get('show_in_gallery') || '0';
            o.show_in_gallery_mobile = fd.get('show_in_gallery_mobile') || '0';
            o.show_in_list = fd.get('show_in_list') || '0';
            o.disable_detail_click = fd.get('disable_detail_click') || '0';
        }
        try {
            if(id) await updateDoc(doc(db, col, id), o); 
            else await setDoc(doc(collection(db, col)), o);
            alert('성공적으로 저장되었습니다! 😊');
            closeModal(); 
            if(col === 'portfolio') renderPortfolio(currentPortfolioFilter);
            else switchView(col);
        } catch(err) {
            alert('저장 중 오류가 발생했습니다: ' + err.message);
        }
    };

    // 1:1 Live Simulator (DIRECT LIVE EDITOR HUB)
    async function renderPlacements() {
        appView.innerHTML = `
            <div class="header-content">
                <div class="view-title">
                    <h1>1:1 라이브 사이트 에디터</h1>
                    <p>시뮬레이터가 아닌 '진짜 내 웹사이트'에서 실시간으로 배치를 수정하세요.</p>
                </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; background:#0a0a0a; border-radius:30px; border:1px solid #1a1a1a; margin-top:2rem; padding: 4rem 2rem;">
                <div style="font-size:5rem; color:var(--accent); margin-bottom:2rem;"><i class="fa-solid fa-layer-group"></i></div>
                <h2 style="font-family:'Outfit'; font-size:2.5rem; font-weight:900; color:#fff; margin-bottom:1rem;">에디터 접속 모드 선택</h2>
                <p style="color:rgba(255,255,255,0.4); max-width:600px; margin-bottom:3.5rem; line-height:1.7;">편집하고 싶은 환경에 맞춰 에디터를 열어주세요.<br>가장 정확한 배치를 위해 <b>[반응형 모바일]</b> 모드 사용 시 <b>F12</b> 키 조작이 권장됩니다.</p>
                
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:1.5rem; width:100%; max-width:1000px;">
                    <!-- 1. LIVE PC -->
                    <a href="/index.html#admin" target="_blank" class="btn" style="background:linear-gradient(135deg, var(--accent) 0%, #0044aa 100%); padding:25px; border-radius:15px; text-decoration:none; display:flex; flex-direction:column; align-items:center;">
                        <i class="fa-solid fa-desktop" style="font-size:2rem; margin-bottom:15px;"></i>
                        <span style="font-size:1.1rem; font-weight:900; margin-bottom:5px;">라이브 PC 에디터</span>
                        <span style="font-size:0.75rem; opacity:0.6;">데스크탑용 배치를 수정합니다</span>
                    </a>

                    <!-- 2. RESPONSIVE MOBILE -->
                    <a href="/index.html#admin-mobile" target="_blank" class="btn" style="background:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); padding:25px; border-radius:15px; text-decoration:none; display:flex; flex-direction:column; align-items:center;">
                        <i class="fa-solid fa-expand" style="font-size:2rem; margin-bottom:15px;"></i>
                        <span style="font-size:1.1rem; font-weight:900; margin-bottom:5px;">반응형 모바일 모드</span>
                        <span style="font-size:0.75rem; opacity:0.7;">창 크기에 따라 비율이 자동 조절됩니다</span>
                    </a>

                    <!-- 3. F12 SIMULATOR (USER PRECEDENCE) -->
                    <a href="/index.html#admin-mobile" target="_blank" class="btn" style="background:linear-gradient(135deg, #ec4899 0%, #db2777 100%); padding:25px; border-radius:15px; text-decoration:none; display:flex; flex-direction:column; align-items:center;">
                        <i class="fa-solid fa-bug" style="font-size:2rem; margin-bottom:15px;"></i>
                        <span style="font-size:1.1rem; font-weight:900; margin-bottom:5px;">모바일 시뮬레이터 (F12)</span>
                        <span style="font-size:0.75rem; opacity:0.9; color:#fff;"><b>필독: F12 → 📱 모바일 아이콘 클릭</b></span>
                        <p style="font-size:10px; margin-top:10px; color:rgba(255,255,255,0.6);">정교한 모바일 배치를 위한 권장 모드</p>
                    </a>
                </div>
            </div>
        `;
    }

    switchView('global');
</script>
</body>
</html>
