<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE3 Admin | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #C8102E; --bg: #000; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; color:#fff; font-family:'Inter', sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        
        /* Animated Background */
        .bg-glow { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:600px; height:600px; background:radial-gradient(circle, rgba(0,102,255,0.15) 0%, transparent 70%); filter:blur(80px); animation: pulsing 10s infinite; pointer-events:none; }
        @keyframes pulsing { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); } }

        .login-card { width:100%; max-width:420px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:30px; padding:3rem; backdrop-filter:blur(20px); position:relative; z-index:10; box-shadow:0 40px 100px rgba(0,0,0,0.5); }
        .logo { font-family:'Outfit'; font-size:1.5rem; font-weight:900; text-align:center; margin-bottom:2rem; letter-spacing:-0.05em; }
        .logo span { color:var(--primary); }
        
        .form-group { margin-bottom:1.5rem; }
        .label { display:block; font-size:0.7rem; font-weight:900; color:var(--primary); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.7rem; }
        .input { width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); padding:1rem; border-radius:12px; color:#fff; font-family:inherit; outline:none; transition:0.3s; }
        .input:focus { border-color:var(--primary); box-shadow:0 0 15px rgba(0,102,255,0.2); }
        
        .btn-login { width:100%; background:linear-gradient(135deg, #fff 0%, var(--primary) 100%); color:#000; border:none; padding:1.2rem; border-radius:12px; font-weight:900; cursor:pointer; margin-top:1rem; transition:0.3s; text-transform:uppercase; letter-spacing:0.05em; }
        .btn-login:hover { transform:translateY(-3px); box-shadow:0 15px 30px rgba(0,102,255,0.4); filter:brightness(1.1); }
        
        #error-msg { color:#ff4444; font-size:0.8rem; text-align:center; margin-top:1rem; font-weight:600; display:none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-card">
        <div class="logo">THE <span>3</span> STUDIO</div>
        <form id="login-form">
            <div class="form-group">
                <label class="label">Username (Email)</label>
                <input type="email" id="email" class="input" placeholder="admin@the3studio.com" required>
            </div>
            <div class="form-group">
                <label class="label">Password</label>
                <input type="password" id="pw" class="input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="login-btn">Secure Login</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTX7XZ3WRxvf1MnpotRvUQC8x9o6N44yc", authDomain: "the3-fc45a.firebaseapp.com",
            projectId: "the3-fc45a", storageBucket: "the3-fc45a.appspot.com",
            messagingSenderId: "431210870560", appId: "1:431210870560:web:89283eeb92998db6358945"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 이미 로그인되어 있으면 대시보드로 이동
        onAuthStateChanged(auth, (user) => {
            if (user) location.assign('/admin/index.html');
        });

        const form = document.getElementById('login-form');
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('error-msg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.innerText = 'Verifying...';
            btn.disabled = true;
            err.style.display = 'none';

            const email = document.getElementById('email').value;
            const pw = document.getElementById('pw').value;

            try {
                await signInWithEmailAndPassword(auth, email, pw);
                location.assign('/admin/index.html');
            } catch (e) {
                console.error(e);
                err.innerText = '로그인 실패: 정보를 다시 확인해 주세요.';
                err.style.display = 'block';
                btn.innerText = 'Secure Login';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
