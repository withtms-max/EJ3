<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE3 STUDIO | Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #0088ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .glow {
            position: absolute; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(0, 136, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%; filter: blur(50px); z-index: -1; animation: float 10s infinite alternate;
        }
        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        .login-card {
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
            padding: 3rem; border-radius: 2rem; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }

        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; background: linear-gradient(to right, #fff, #555); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 2.5rem; }

        .input-group { position: relative; margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; margin-left: 0.5rem; }
        .input-group input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 1rem; border-radius: 1rem; color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(0, 136, 255, 0.2); }

        .btn-login {
            width: 100%; padding: 1rem; border-radius: 1rem; border: none;
            background: linear-gradient(135deg, #0088ff, #0055ff); color: #fff;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 1rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 136, 255, 0.4); }
        .btn-login:active { transform: translateY(0); }

        .error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 1rem; display: none; }
        
        .footer-links { margin-top: 2rem; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
        .footer-links a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="login-card">
        <div class="logo">THE 3 STUDIO</div>
        <p class="tagline">Cloud Management Suite</p>
        
        <form id="login-form">
            <div class="input-group">
                <label>Administrator Email</label>
                <input type="email" id="email" required placeholder="admin@the3studio.com">
            </div>
            <div class="input-group">
                <label>Access Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-login" id="btn-submit">Sign In</button>
            <div class="error-msg" id="error-msg">로그인 정보를 확인해주세요.</div>
        </form>

        <div class="footer-links">
            Don't have access? <a href="mailto:contact@the3studio.com">Contact Support</a>
        </div>
    </div>

    <script type="module">
        import { auth } from '../js/firebase-init.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn-submit');
        const errorMsg = document.getElementById('error-msg');

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerText = 'Verifying...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                errorMsg.innerText = 'Login Failed: ' + error.message;
                errorMsg.style.display = 'block';
                btn.innerText = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
