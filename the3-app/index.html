
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE3 Studio - 소상공인을 위한 AI 이미지 솔루션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #FFF9F2; /* Warm Cream Background from BizCut */
      -webkit-tap-highlight-color: transparent;
      color: #1E293B;
    }
    .warm-gradient {
      background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
    }
    .text-primary {
      color: #F97316 !important;
    }
    .bg-primary {
      background-color: #F97316 !important;
    }
    .step-indicator {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .white-header {
      background-color: #FFFFFF;
      border-bottom: 1px solid #F1F5F9;
    }
    .highlight-underline {
      position: relative;
      display: inline-block;
    }
    .highlight-underline::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      height: 12px;
      background-color: #FFD6A5;
      z-index: -1;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
