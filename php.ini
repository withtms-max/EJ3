upload_max_filesize = 128M
post_max_size = 128M
memory_limit = 256M
file_uploads = On

; Vercel(Linux) 환경에서는 아래의 'ext' 설정과 특정 확장자 수동 로드가 오류를 일으킬 수 있습니다.
; vercel-php 런타임은 필요한 확장자(PDO, SQLite 등)를 기본적으로 포함하고 있습니다.

extension_dir = "C:\Users\chs91\php\ext"
extension=pdo_sqlite
extension=sqlite3
extension=mbstring
extension=openssl
extension=curl
extension=fileinfo
extension=gd
